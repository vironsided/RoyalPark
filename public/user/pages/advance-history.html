<section class="user-bills-section advance-history-page">
    <div class="user-bills-card">
        <div class="user-bills-header">
            <h2 data-i18n="user_advance_history_title">Куда ушёл аванс</h2>
            <div class="ah-page-summary">
                <span class="ah-total-label" data-i18n="user_ah_total_deducted">Всего списано:</span>
                <span class="ah-total-value" id="ahTotalApplied">0.00 ₼</span>
            </div>
        </div>

        <div class="user-bills-table-wrapper">
            <table class="user-bills-table ah-table">
                <thead>
                    <tr>
                        <th data-i18n="user_ah_th_date">Дата</th>
                        <th data-i18n="user_ah_th_invoice">Счёт</th>
                        <th data-i18n="user_ah_th_period">Период</th>
                        <th data-i18n="user_ah_th_type">Тип</th>
                        <th data-i18n="user_ah_th_amount">Сумма</th>
                    </tr>
                </thead>
                <tbody id="ahTableBody">
                </tbody>
            </table>
        </div>

        <div class="table-pagination">
            <div class="pagination-controls" id="ahPaginationControls">
                <button class="btn-pagination" id="ahPrevBtn" disabled>
                    <i class="bi bi-chevron-double-left"></i>
                </button>
                <div id="ahPageButtons" class="pagination-pages"></div>
                <button class="btn-pagination" id="ahNextBtn" disabled>
                    <i class="bi bi-chevron-double-right"></i>
                </button>
            </div>
            <div class="pagination-info">
                <span><span data-i18n="pagination_page">Стр.</span> <span id="ahCurrentPage">1</span> <span data-i18n="pagination_of">из</span> <span id="ahTotalPages">1</span> · <span data-i18n="pagination_total">всего</span>
                    <span id="ahTotalItems">0</span></span>
            </div>
            <div class="pagination-per-page">
                <span data-i18n="pagination_on">На</span>
                <span data-i18n="pagination_per_page">странице:</span>
                <div class="custom-pag-select" id="customAhItemsPerPage">
                    <select id="ahItemsPerPage" style="display:none;">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <div class="select-btn">
                        <span class="select-text">25</span>
                        <span class="arrow">▾</span>
                    </div>
                    <div class="select-options">
                        <div class="select-option" data-value="10">10</div>
                        <div class="select-option selected" data-value="25">25</div>
                        <div class="select-option" data-value="50">50</div>
                        <div class="select-option" data-value="100">100</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
.table-pagination {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 0.9rem;
    margin-top: 1.25rem;
    gap: 1rem;
}
html[data-theme="dark"] body.user-app .table-pagination {
    background: rgba(255, 255, 255, 0.94) !important;
    border: 1px solid rgba(177, 186, 136, 0.28) !important;
}
.pagination-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.pagination-pages { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-pagination {
    min-width: 36px; height: 36px; padding: 0 12px;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(177, 186, 136, 0.3);
    border-radius: 8px; color: #56565c; cursor: pointer;
    transition: all 0.3s; display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
}
.btn-pagination:hover:not(:disabled) {
    background: rgba(177, 186, 136, 0.14);
    border-color: rgba(177, 186, 136, 0.45);
    color: #3d3d42;
}
.btn-pagination:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-pagination.active {
    background: linear-gradient(135deg, #c5cd9f 0%, #b1ba88 100%);
    border-color: #b1ba88;
    color: #ffffff;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(177, 186, 136, 0.35);
}
.pagination-info {
    color: var(--text-secondary);
    font-size: 0.9rem;
    white-space: nowrap;
}
.pagination-per-page {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    font-size: 0.9rem;
    white-space: nowrap;
}
.custom-pag-select { position: relative; display: inline-block; min-width: 60px; }
.custom-pag-select .select-btn {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px; background: rgba(255, 255, 255, 0.95);
    border: 1px solid rgba(177, 186, 136, 0.3); border-radius: 6px;
    color: #56565c; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; min-width: 60px; user-select: none;
}
.custom-pag-select .select-btn:hover { background: #fff; border-color: rgba(177, 186, 136, 0.45); }
.custom-pag-select .select-options {
    position: absolute; bottom: calc(100% + 8px); left: 0;
    background: #fafaf6 !important; border: 1px solid rgba(177, 186, 136, 0.28) !important;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1); border-radius: 8px; padding: 6px; display: none; min-width: 70px; z-index: 5;
}
.custom-pag-select.open .select-options { display: block; }
.custom-pag-select .select-option {
    padding: 6px 10px; border-radius: 6px; color: #56565c; cursor: pointer; transition: all 0.2s; text-align: center;
}
.custom-pag-select .select-option:hover { background: rgba(177, 186, 136, 0.16); }
.custom-pag-select .select-option.selected {
    background: linear-gradient(135deg, #c5cd9f 0%, #b1ba88 100%);
    color: #fff;
}
.custom-pag-select .arrow { margin-left: 6px; font-size: 0.75rem; opacity: 0.8; }
/* Clickable rows */
.ah-table tbody tr.ah-row { cursor: pointer; transition: background 0.15s; }
.ah-table tbody tr.ah-row:hover { background: rgba(177, 186, 136, 0.08); }
.ah-table tbody tr.ah-row.expanded { background: rgba(177, 186, 136, 0.12); }
.ah-table tbody tr.ah-row td:first-child { position: relative; padding-left: 28px; }
.ah-row-chevron {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%) rotate(0deg);
    transition: transform 0.2s; font-size: 0.7rem; color: var(--text-secondary);
}
.ah-row.expanded .ah-row-chevron { transform: translateY(-50%) rotate(90deg); }

/* Detail sub-row */
.ah-detail-row td { padding: 0 !important; border-top: none !important; }
.ah-detail-inner {
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease;
    padding: 0 16px; background: rgba(177, 186, 136, 0.04); border-radius: 0 0 10px 10px;
}
.ah-detail-row.open .ah-detail-inner {
    max-height: 500px; padding: 12px 16px;
}
.ah-detail-list { display: flex; flex-direction: column; gap: 6px; }
.ah-detail-line {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; border-radius: 8px; background: rgba(255,255,255,0.6);
    border: 1px solid rgba(177, 186, 136, 0.12); font-size: 0.85rem;
}
[data-theme="dark"] .ah-detail-line {
    background: rgba(177, 186, 136, 0.06); border-color: rgba(177, 186, 136, 0.12);
}
.ah-detail-line .ah-dl-desc { font-weight: 500; color: var(--text-primary); }
.ah-detail-line .ah-dl-amount { font-weight: 600; white-space: nowrap; }
.ah-detail-loading { text-align: center; padding: 12px; color: var(--text-secondary); font-size: 0.85rem; }

@media (max-width: 768px) {
    body.user-app .advance-history-page .table-pagination {
        flex-direction: column; align-items: stretch; justify-content: flex-start; gap: 0.55rem; padding: 0.7rem;
    }
    body.user-app .advance-history-page .pagination-controls { width: 100%; justify-content: center; gap: 4px; }
    body.user-app .advance-history-page .pagination-pages { gap: 4px; justify-content: center; }
    body.user-app .advance-history-page .btn-pagination { min-width: 28px; height: 28px; padding: 0 5px; font-size: 0.72rem; border-radius: 6px; }
    body.user-app .advance-history-page .pagination-info,
    body.user-app .advance-history-page .pagination-per-page { font-size: 0.72rem; white-space: normal; text-align: center; justify-content: center; }
    body.user-app .advance-history-page .pagination-per-page { flex-wrap: wrap; gap: 6px; padding-top: 0.35rem; }
}
</style>

<script>
(function() {
    'use strict';
    const API = window.getApiBase ? window.getApiBase() : (window.API_BASE_URL || 'http://localhost:8000');
    const paginationState = {
        currentPage: 1,
        itemsPerPage: 25,
        totalPages: 1,
        totalItems: 0
    };

    const lang = () => localStorage.getItem('language') || 'ru';

    const L = {
        loading:  { ru: 'Загрузка...', az: 'Yüklənir...', en: 'Loading...' },
        empty:    { ru: 'Списаний аванса пока нет', az: 'Avans silinmələri yoxdur', en: 'No advance deductions yet' },
        error:    { ru: 'Ошибка загрузки', az: 'Yükləmə xətası', en: 'Loading error' },
        auto:     { ru: 'Авто', az: 'Avto', en: 'Auto' },
        manual:   { ru: 'Вручную', az: 'Əl ilə', en: 'Manual' },
        detail_loading: { ru: 'Загрузка деталей...', az: 'Detallar yüklənir...', en: 'Loading details...' },
        detail_no_lines: { ru: 'Нет данных по услугам', az: 'Xidmət məlumatı yoxdur', en: 'No service details' },
        invoice_total: { ru: 'Итого по счёту', az: 'Hesab cəmi', en: 'Invoice total' },
        applied: { ru: 'Списано с аванса', az: 'Avansdan silinib', en: 'Deducted from advance' },
    };

    function t(key) {
        const l = lang();
        return (L[key] && L[key][l]) || (L[key] && L[key].ru) || key;
    }

    function escapeHtml(str) {
        if (str == null || str === '') return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function localizeLineDescription(raw) {
        const l = lang();
        if (window.invoiceLineI18n && typeof window.invoiceLineI18n.formatInvoiceLineDescription === 'function') {
            return window.invoiceLineI18n.formatInvoiceLineDescription(raw, l);
        }
        return raw || '—';
    }

    function formatDate(iso) {
        if (!iso) return '—';
        try {
            const d = new Date(iso);
            const l = lang();
            return d.toLocaleDateString(l === 'az' ? 'az-AZ' : l === 'en' ? 'en-US' : 'ru-RU', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        } catch { return iso; }
    }

    async function loadPage(page) {
        const tbody = document.getElementById('ahTableBody');
        if (!tbody) return;

        tbody.innerHTML = `<tr><td colspan="5" class="ah-table-empty">${t('loading')}</td></tr>`;

        try {
            const resp = await fetch(`${API}/api/resident/advance-history?page=${page}&per_page=${paginationState.itemsPerPage}`, {
                credentials: 'include'
            });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();

            paginationState.currentPage = data.page || 1;
            paginationState.totalPages = data.pages || 1;
            paginationState.totalItems = data.total || 0;

            const totalEl = document.getElementById('ahTotalApplied');
            if (totalEl) totalEl.textContent = Number(data.total_applied || 0).toFixed(2) + ' ₼';

            if (!data.items || data.items.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="ah-table-empty">${t('empty')}</td></tr>`;
                updatePaginationUI();
                return;
            }

            tbody.innerHTML = data.items.map(item => {
                const isAuto = item.type === 'auto';
                const typeClass = isAuto ? 'ah-badge auto' : 'ah-badge manual';
                const typeText = isAuto ? t('auto') : t('manual');
                const invText = item.invoice_number || '—';
                const period = item.period || '—';

                return `<tr class="ah-row" data-app-id="${item.id}">
                    <td><i class="bi bi-chevron-right ah-row-chevron"></i>${formatDate(item.date)}</td>
                    <td>${invText}</td>
                    <td>${period}</td>
                    <td><span class="${typeClass}">${typeText}</span></td>
                    <td class="ah-cell-amount">−${Number(item.amount).toFixed(2)} ₼</td>
                </tr>
                <tr class="ah-detail-row" id="ah-detail-${item.id}">
                    <td colspan="5">
                        <div class="ah-detail-inner">
                            <div class="ah-detail-list ah-detail-loading">${t('detail_loading')}</div>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            tbody.querySelectorAll('.ah-row').forEach(row => {
                row.addEventListener('click', () => toggleDetail(row));
            });

            updatePaginationUI();
        } catch(err) {
            console.error('Advance history load error:', err);
            tbody.innerHTML = `<tr><td colspan="5" class="ah-table-empty">${t('error')}</td></tr>`;
        }
    }

    const detailCache = {};

    function toggleDetail(row) {
        const appId = row.getAttribute('data-app-id');
        const detailRow = document.getElementById('ah-detail-' + appId);
        if (!detailRow) return;

        const wasOpen = detailRow.classList.contains('open');

        // Close all open details
        document.querySelectorAll('.ah-detail-row.open').forEach(r => r.classList.remove('open'));
        document.querySelectorAll('.ah-row.expanded').forEach(r => r.classList.remove('expanded'));

        if (wasOpen) return;

        row.classList.add('expanded');
        detailRow.classList.add('open');

        if (!detailCache[appId]) {
            loadDetail(appId, detailRow);
        }
    }

    async function loadDetail(appId, detailRow) {
        const listEl = detailRow.querySelector('.ah-detail-list');
        if (!listEl) return;
        listEl.className = 'ah-detail-list ah-detail-loading';
        listEl.innerHTML = t('detail_loading');

        try {
            const resp = await fetch(`${API}/api/resident/advance-history/${appId}`, { credentials: 'include' });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            detailCache[appId] = data;

            if (!data.lines || data.lines.length === 0) {
                listEl.className = 'ah-detail-list ah-detail-loading';
                listEl.innerHTML = t('detail_no_lines');
                return;
            }

            let html = data.lines.map((ln) => {
                const lineLabel = escapeHtml(localizeLineDescription(ln.description));
                return `<div class="ah-detail-line">
                    <span class="ah-dl-desc">${lineLabel}
                        <span style="color:var(--text-secondary); font-weight:400; font-size:0.78rem; margin-left:6px;">(${Number(ln.amount_total).toFixed(2)} ₼)</span>
                    </span>
                    <span class="ah-dl-amount" style="color:var(--danger-color, #c85a5a);">−${Number(ln.applied_share).toFixed(2)} ₼</span>
                </div>`;
            }).join('');

            html += `<div class="ah-detail-line" style="margin-top:6px; border-top: 2px solid rgba(177,186,136,0.25); padding-top: 8px;">
                <span class="ah-dl-desc" style="font-weight:700;">${t('invoice_total')}: ${Number(data.invoice_total).toFixed(2)} ₼</span>
                <span class="ah-dl-amount" style="color:var(--danger-color, #c85a5a); font-weight:700;">${t('applied')}: −${Number(data.amount_applied).toFixed(2)} ₼</span>
            </div>`;

            listEl.className = 'ah-detail-list';
            listEl.innerHTML = html;
        } catch (err) {
            console.error('Detail load error:', err);
            listEl.className = 'ah-detail-list ah-detail-loading';
            listEl.innerHTML = t('error');
        }
    }

    function updatePaginationUI() {
        const pageText = document.getElementById('ahCurrentPage');
        const totalPageText = document.getElementById('ahTotalPages');
        const totalItemsText = document.getElementById('ahTotalItems');
        const prev = document.getElementById('ahPrevBtn');
        const next = document.getElementById('ahNextBtn');
        const pagesContainer = document.getElementById('ahPageButtons');
        const select = document.getElementById('ahItemsPerPage');
        const selectText = document.querySelector('#customAhItemsPerPage .select-text');
        const { currentPage, totalPages, totalItems, itemsPerPage } = paginationState;

        if (pageText) pageText.textContent = totalPages ? currentPage : 0;
        if (totalPageText) totalPageText.textContent = totalPages || 1;
        if (totalItemsText) totalItemsText.textContent = totalItems || 0;
        if (prev) prev.disabled = currentPage <= 1;
        if (next) next.disabled = currentPage >= totalPages;
        if (select) select.value = String(itemsPerPage);
        if (selectText) selectText.textContent = itemsPerPage;

        if (pagesContainer) {
            pagesContainer.innerHTML = '';
            const pages = buildPages(totalPages, currentPage);
            pages.forEach((p) => {
                if (p === 'ellipsis') {
                    const dot = document.createElement('span');
                    dot.className = 'btn-pagination disabled';
                    dot.textContent = '...';
                    pagesContainer.appendChild(dot);
                } else {
                    const btn = document.createElement('button');
                    btn.className = 'btn-pagination' + (p === currentPage ? ' active' : '');
                    btn.textContent = p;
                    btn.addEventListener('click', () => goToPage(p));
                    pagesContainer.appendChild(btn);
                }
            });
        }
    }

    function buildPages(totalPages, currentPage) {
        const pages = [];
        if (totalPages <= 5) {
            for (let i = 1; i <= totalPages; i++) pages.push(i);
            return pages;
        }
        pages.push(1);
        if (currentPage <= 4) {
            pages.push(2, 3, 4, 5, 'ellipsis', totalPages);
            return pages;
        }
        if (currentPage >= totalPages - 3) {
            pages.push('ellipsis');
            for (let i = totalPages - 4; i < totalPages; i++) pages.push(i);
            pages.push(totalPages);
            return pages;
        }
        pages.push('ellipsis', currentPage - 1, currentPage, currentPage + 1, 'ellipsis', totalPages);
        return pages;
    }

    function goToPage(target) {
        if (target === 'prev' && paginationState.currentPage > 1) {
            paginationState.currentPage -= 1;
        } else if (target === 'next' && paginationState.currentPage < paginationState.totalPages) {
            paginationState.currentPage += 1;
        } else if (typeof target === 'number') {
            paginationState.currentPage = Math.min(Math.max(1, target), paginationState.totalPages);
        }
        loadPage(paginationState.currentPage);
    }

    function changeItemsPerPage(value) {
        paginationState.itemsPerPage = parseInt(value, 10) || 25;
        paginationState.currentPage = 1;
        document.querySelectorAll('#customAhItemsPerPage .select-option').forEach((opt) => {
            opt.classList.toggle('selected', opt.getAttribute('data-value') === String(paginationState.itemsPerPage));
        });
        loadPage(1);
    }

    function initCustomPaginationDropdown() {
        const customSelect = document.getElementById('customAhItemsPerPage');
        if (!customSelect) return;
        const selectBtn = customSelect.querySelector('.select-btn');
        const options = customSelect.querySelectorAll('.select-option');
        selectBtn?.addEventListener('click', (e) => {
            e.stopPropagation();
            customSelect.classList.toggle('open');
        });
        options.forEach((opt) => {
            opt.addEventListener('click', (e) => {
                e.stopPropagation();
                const value = opt.getAttribute('data-value');
                const select = document.getElementById('ahItemsPerPage');
                if (select) select.value = value;
                changeItemsPerPage(value);
                customSelect.classList.remove('open');
            });
        });
        document.addEventListener('click', (e) => {
            if (!customSelect.contains(e.target)) customSelect.classList.remove('open');
        });
    }

    document.getElementById('ahPrevBtn')?.addEventListener('click', () => goToPage('prev'));
    document.getElementById('ahNextBtn')?.addEventListener('click', () => goToPage('next'));

    initCustomPaginationDropdown();
    loadPage(1);

    // Re-render on language change so badges update
    let _currentLang = lang();
    function _clearCache() { Object.keys(detailCache).forEach(k => delete detailCache[k]); }
    window.addEventListener('languageChanged', () => { _clearCache(); loadPage(paginationState.currentPage); });
    window.addEventListener('storage', (e) => { if (e.key === 'language') { _clearCache(); loadPage(paginationState.currentPage); } });
    const _langPoll = setInterval(() => {
        const nl = lang();
        if (nl !== _currentLang) { _currentLang = nl; _clearCache(); loadPage(paginationState.currentPage); }
    }, 300);
    window.addEventListener('beforeunload', () => clearInterval(_langPoll));
})();
</script>
