<script>
(function(){
    const API_BASE = window.getApiBase ? window.getApiBase() : (window.BACKEND_API_BASE || 'http://localhost:8000');
    const t = (key, fallback = '') => window.i18n?.translate?.(key) || fallback || key;
    function isPaymentsRoute() {
        const route = String(window.spaRouter?.currentRoute || window.location.hash.replace('#', '') || '');
        return route === '/payments' || route.startsWith('/payments');
    }
    function hasPaymentsDom() {
        return !!document.querySelector('.payments-page');
    }
    const serviceKeys = ['utility', 'electric', 'gas', 'water', 'sewerage', 'service', 'rent', 'construction', 'unallocated'];
    const serviceLabelKeyMap = {
        utility: 'payments_service_utility',
        electric: 'meter_electricity',
        gas: 'meter_gas',
        water: 'meter_cold_water',
        sewerage: 'readings_meter_sewerage',
        service: 'tariffs_purpose_service',
        rent: 'tariffs_purpose_rent',
        construction: 'tariffs_purpose_construction',
        unallocated: 'payments_service_unallocated'
    };
    const utilityServiceKeys = ['electric', 'gas', 'water', 'sewerage'];

    function getMethodLabel(method) {
        if (method === 'CASH') return t('payments_method_cash', 'Наличные');
        if (method === 'TRANSFER') return t('payments_method_transfer', 'Банк');
        if (method === 'ONLINE') return t('payments_method_online', 'Онлайн');
        if (method === 'CARD') return t('payments_method_card', 'Карта');
        return method || '—';
    }

    function getReferenceLabel(reference) {
        if (!reference) return '—';
        const raw = String(reference);

        if (raw.startsWith('ADVANCE_USE')) {
            return t('payment_advance_auto_done', 'Аванс автоматически распределён по счетам');
        }

        return raw;
    }

    function getServiceLabel(key) {
        const i18nKey = serviceLabelKeyMap[key];
        if (!i18nKey) return key;
        return t(i18nKey, key);
    }

    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function formatPaymentDate(dateStr) {
        if (!dateStr) return '—';
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        const ss = String(d.getSeconds()).padStart(2, '0');
        return `${yyyy}/${mm}/${dd} ${hh}:${mi}:${ss}`;
    }
    
    let residents = [];
    let paymentsData = {
        items: [],
        total: 0,
        page: 1,
        per_page: 25,
        last_page: 1
    };
    
    // Pagination state
    let paginationState = {
        currentPage: 1,
        itemsPerPage: 25,
        totalItems: 0,
        totalPages: 1
    };
    const invoiceBreakdownCache = new Map();
    const invoiceAllocationCache = new Map();
    let clientFilteredPayments = null;

    function renderClientPaymentsPage() {
        if (!Array.isArray(clientFilteredPayments)) return false;

        const total = clientFilteredPayments.length;
        const totalPages = Math.max(1, Math.ceil(total / paginationState.itemsPerPage));
        paginationState.totalItems = total;
        paginationState.totalPages = totalPages;
        if (paginationState.currentPage > totalPages) {
            paginationState.currentPage = totalPages;
        }

        const start = (paginationState.currentPage - 1) * paginationState.itemsPerPage;
        const end = start + paginationState.itemsPerPage;
        const pageItems = clientFilteredPayments.slice(start, end);

        paymentsData = {
            items: pageItems,
            total,
            page: paginationState.currentPage,
            per_page: paginationState.itemsPerPage,
            last_page: totalPages
        };
        renderTable();
        return true;
    }
    
    // Load payments from API
    async function loadPayments(forceServer = false) {
        if (!forceServer && renderClientPaymentsPage()) {
            return;
        }

        const tbody = document.getElementById('paymentsTable');
        if (tbody) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted">${t('loading', 'Загрузка...')}</td></tr>`;
        }
        
        const params = buildPaymentFilterParams();
        params.append('page', paginationState.currentPage);
        params.append('per_page', paginationState.itemsPerPage);
        
        try {
            let response = await fetch(`${API_BASE}/api/payments?${params.toString()}`, { credentials: 'include' });
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const data = await response.json();
            paymentsData = data;
            paginationState.totalItems = data.total;
            paginationState.totalPages = data.last_page;
            paginationState.currentPage = data.page;
            
            renderTable();
        } catch (error) {
            console.error('Error loading payments:', error);
            if (tbody) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center text-danger">${t('error_loading_data', 'Ошибка загрузки данных')}</td></tr>`;
            }
            if (typeof showError === 'function') {
                showError(`${t('payments_load_error_prefix', 'Ошибка загрузки платежей')}: ${error.message}`);
            }
        }
    }

    function buildPaymentFilterParams() {
        const params = new URLSearchParams();

        const residentId = document.getElementById('filterResident')?.value;
        if (residentId && residentId !== 'all') {
            params.append('resident_id', residentId);
        }

        const method = document.getElementById('filterMethod')?.value;
        if (method && method !== 'all') {
            params.append('method', method);
        }

        const dateFrom = document.getElementById('filterDateFrom')?.value;
        if (dateFrom) {
            params.append('date_from', dateFrom);
        }

        const dateTo = document.getElementById('filterDateTo')?.value;
        if (dateTo) {
            params.append('date_to', dateTo);
        }

        const search = document.getElementById('filterSearch')?.value.trim();
        if (search) {
            params.append('q', search);
        }

        return params;
    }

    async function fetchPaymentsPage(page, perPage) {
        const params = buildPaymentFilterParams();
        params.append('page', page);
        params.append('per_page', perPage);

        const response = await fetch(`${API_BASE}/api/payments?${params.toString()}`, { credentials: 'include' });
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
    }

    async function fetchAllFilteredPayments() {
        const perPage = 100;
        let page = 1;
        let lastPage = 1;
        const allItems = [];

        while (page <= lastPage) {
            const data = await fetchPaymentsPage(page, perPage);
            const items = Array.isArray(data) ? data : (data.items || []);
            allItems.push(...items);
            lastPage = data.last_page || 1;
            page += 1;
        }

        return allItems;
    }

    function toCsvValue(value) {
        const str = value === null || value === undefined ? '' : String(value);
        const escaped = str.replace(/"/g, '""');
        return `"${escaped}"`;
    }

    function toMoney(value) {
        const num = Number(value || 0);
        return Number.isFinite(num) ? num.toFixed(2) : '0.00';
    }

    function getServiceDisplayLabel(key) {
        if (key === 'utility') {
            const includes = utilityServiceKeys.map((k) => getServiceLabel(k)).join(', ');
            return `${getServiceLabel('utility')} (${includes})`;
        }
        return getServiceLabel(key);
    }

    function getServiceRowLabel(key) {
        return getServiceLabel(key);
    }

    function getUtilityAmount(serviceBreakdown) {
        return utilityServiceKeys.reduce((acc, key) => acc + Number(serviceBreakdown[key] || 0), 0);
    }

    function classifyServiceByDescription(description) {
        const low = String(description || '').toLowerCase();
        if (!low) return 'unallocated';
        if (low.includes('электр') || low.includes('electric') || low.includes('meter_electric')) return 'electric';
        if (low.includes('газ') || low.includes('meter_gas')) return 'gas';
        if (low.includes('вода') || low.includes('water') || low.includes('meter_cold_water') || low.includes('meter_water')) return 'water';
        if (low.includes('канализац') || low.includes('sewerage') || low.includes('meter_sewerage')) return 'sewerage';
        if (low.includes('сервис') || low.includes('service') || low.includes('коммун') || low.includes('utility')) return 'service';
        if (low.includes('аренда') || low.includes('rent')) return 'rent';
        if (low.includes('строител') || low.includes('construction')) return 'construction';
        return 'service';
    }

    function getSelectedExportServices() {
        const checked = Array.from(
            document.querySelectorAll('#serviceExportOptions input[type="checkbox"]:checked')
        ).map((el) => el.value);

        // Если все сняты, считаем как "все", чтобы не получить пустой отчёт случайно.
        if (checked.length === 0) {
            return serviceKeys.slice();
        }
        return checked;
    }

    function applyUtilitySelectionRules(optionsRoot) {
        const utilityCb = optionsRoot.querySelector('input[type="checkbox"][value="utility"]');
        if (!utilityCb) return;

        const utilityChildren = utilityServiceKeys
            .map((key) => optionsRoot.querySelector(`input[type="checkbox"][value="${key}"]`))
            .filter(Boolean);

        if (utilityCb.checked) {
            utilityChildren.forEach((cb) => {
                cb.checked = true;
                cb.disabled = true;
            });
            utilityCb.disabled = false;
            return;
        }

        utilityChildren.forEach((cb) => {
            cb.disabled = false;
        });

        const anyChildChecked = utilityChildren.some((cb) => cb.checked);
        utilityCb.disabled = anyChildChecked;
        if (anyChildChecked) {
            utilityCb.checked = false;
        }
    }

    function updateServiceSummaryLabel() {
        const summaryEl = document.getElementById('serviceExportSummary');
        if (!summaryEl) return;
        const selected = getSelectedExportServices();
        if (selected.length === serviceKeys.length) {
            summaryEl.textContent = t('payments_services_all_categories', 'Все категории');
            return;
        }
        const preview = selected.slice(0, 2).map((k) => getServiceLabel(k)).join(', ');
        summaryEl.textContent = selected.length > 2 ? `${preview} +${selected.length - 2}` : preview;
    }

    function initServiceExportFilters() {
        const details = document.getElementById('serviceExportDetails');
        const optionsRoot = document.getElementById('serviceExportOptions');
        const selectAllBtn = document.getElementById('serviceSelectAllBtn');
        const okBtn = document.getElementById('serviceOkBtn');
        const clearBtn = document.getElementById('serviceClearBtn');
        if (!optionsRoot) return;

        if (okBtn) {
            if (okBtn._clickHandler) okBtn.removeEventListener('click', okBtn._clickHandler);
            okBtn._clickHandler = function () {
                if (details) details.open = false;
            };
            okBtn.addEventListener('click', okBtn._clickHandler);
        }

        if (optionsRoot.dataset.initialized === 'true') {
            applyUtilitySelectionRules(optionsRoot);
            updateServiceSummaryLabel();
            return;
        }
        optionsRoot.dataset.initialized = 'true';

        optionsRoot.querySelectorAll('input[type="checkbox"]').forEach((cb) => {
            cb.addEventListener('change', function () {
                applyUtilitySelectionRules(optionsRoot);
                updateServiceSummaryLabel();
            });
        });

        if (selectAllBtn) {
            selectAllBtn.addEventListener('click', function () {
                optionsRoot.querySelectorAll('input[type="checkbox"]').forEach((cb) => {
                    cb.checked = true;
                    cb.disabled = false;
                });
                applyUtilitySelectionRules(optionsRoot);
                updateServiceSummaryLabel();
            });
        }

        if (clearBtn) {
            clearBtn.addEventListener('click', function () {
                optionsRoot.querySelectorAll('input[type="checkbox"]').forEach((cb) => {
                    cb.checked = false;
                    cb.disabled = false;
                });
                applyUtilitySelectionRules(optionsRoot);
                updateServiceSummaryLabel();
            });
        }

        applyUtilitySelectionRules(optionsRoot);
        updateServiceSummaryLabel();
    }

    function getExportExtraFilters() {
        const minAmountRaw = document.getElementById('filterAmountMin')?.value;
        const maxAmountRaw = document.getElementById('filterAmountMax')?.value;
        const minAmount = minAmountRaw === '' || minAmountRaw === undefined ? null : Number(minAmountRaw);
        const maxAmount = maxAmountRaw === '' || maxAmountRaw === undefined ? null : Number(maxAmountRaw);
        return {
            minAmount: Number.isFinite(minAmount) ? minAmount : null,
            maxAmount: Number.isFinite(maxAmount) ? maxAmount : null,
            allocatedOnly: !!document.getElementById('filterAllocatedOnly')?.checked,
        };
    }

    function hasAlternativeExportFilter() {

        if (residentId && residentId !== 'all') return true;

        if (method && method !== 'all') return true;

        if (search) return true;

    async function getInvoiceServiceBreakdown(invoiceId) {
        const id = Number(invoiceId);
        if (!Number.isFinite(id) || id <= 0) {
            return { total: 0, serviceTotals: {} };
        }
        if (invoiceBreakdownCache.has(id)) {
            return invoiceBreakdownCache.get(id);
        }

        const response = await fetch(`${API_BASE}/api/invoices/${id}`, { credentials: 'include' });
        if (!response.ok) {
            const fallback = { total: 0, serviceTotals: {} };
            invoiceBreakdownCache.set(id, fallback);
            return fallback;
        }

        const invoice = await response.json();
        const lines = Array.isArray(invoice.lines) ? invoice.lines : [];
        const serviceTotals = {};
        let total = 0;

        lines.forEach((line) => {
            const amount = Number(line.amount_total || 0);
            if (!(amount > 0)) return;
            const key = classifyServiceByDescription(line.description);
            serviceTotals[key] = (serviceTotals[key] || 0) + amount;
            total += amount;
        });

        if (!(total > 0)) {
            total = Number(invoice.amount_total || 0);
        }

        const breakdown = { total, serviceTotals };
        invoiceBreakdownCache.set(id, breakdown);
        return breakdown;
    }

    function parseSelectedLineIds(reference) {
        if (!reference) return [];
        const marker = 'LINESEL:';
        const idx = String(reference).indexOf(marker);
        if (idx < 0) return [];
        const raw = String(reference).slice(idx + marker.length).split('|')[0];
        return raw
            .split(',')
            .map((v) => Number(String(v).trim()))
            .filter((v) => Number.isFinite(v) && v > 0);
    }

    function normalizeSelectedLineIdsForWaterSewer(selectedIds, linesById) {
        const normalized = new Set(selectedIds);
        const list = Array.from(normalized);
        const isWater = (line) => {
            const d = String(line?.description || '').toLowerCase();
            return d.includes('вода');
        };
        const isSewer = (line) => {
            const d = String(line?.description || '').toLowerCase();
            return d.includes('канализац');
        };
        for (const lineId of list) {
            const line = linesById.get(lineId);
            if (!line) continue;
            if (isWater(line)) {
                const pair = Array.from(linesById.values()).find((candidate) => (
                    !normalized.has(Number(candidate.id || 0))
                    && isSewer(candidate)
                    && Number(candidate.amount_total || 0) === Number(line.amount_total || 0)
                ));
                if (pair?.id) normalized.add(Number(pair.id));
            } else if (isSewer(line)) {
                const pair = Array.from(linesById.values()).find((candidate) => (
                    !normalized.has(Number(candidate.id || 0))
                    && isWater(candidate)
                    && Number(candidate.amount_total || 0) === Number(line.amount_total || 0)
                ));
                if (pair?.id) normalized.add(Number(pair.id));
            }
        }
        return Array.from(normalized);
    }

    async function getInvoiceAllocationSnapshot(invoiceId) {
        const id = Number(invoiceId);
        if (!Number.isFinite(id) || id <= 0) {
            return { linesById: new Map(), appLineAllocations: new Map() };
        }
        if (invoiceAllocationCache.has(id)) {
            return invoiceAllocationCache.get(id);
        }

        const response = await fetch(`${API_BASE}/api/invoices/${id}`, { credentials: 'include' });
        if (!response.ok) {
            const fallback = { linesById: new Map(), appLineAllocations: new Map() };
            invoiceAllocationCache.set(id, fallback);
            return fallback;
        }

        const invoice = await response.json();
        const lines = Array.isArray(invoice?.lines) ? invoice.lines : [];
        const invoiceApps = Array.isArray(invoice?.payments) ? invoice.payments : [];

        const linesById = new Map();
        const defaultLineOrder = [];
        lines.forEach((line) => {
            const lineId = Number(line?.id || 0);
            if (!(lineId > 0)) return;
            linesById.set(lineId, line);
            defaultLineOrder.push(lineId);
        });

        const linePaid = new Map();
        defaultLineOrder.forEach((lineId) => linePaid.set(lineId, 0));

        const orderedApps = invoiceApps
            .map((app) => ({
                id: Number(app?.id || 0),
                amount: Number(app?.amount || 0),
                appReference: String(app?.app_reference || ''),
                dateMs: new Date(app?.date || 0).getTime(),
            }))
            .filter((app) => app.id > 0 && app.amount > 0)
            .sort((a, b) => {
                const ta = Number.isFinite(a.dateMs) ? a.dateMs : 0;
                const tb = Number.isFinite(b.dateMs) ? b.dateMs : 0;
                if (ta !== tb) return ta - tb;
                return a.id - b.id;
            });

        const appLineAllocations = new Map();
        orderedApps.forEach((app) => {
            let selectedIds = parseSelectedLineIds(app.appReference);
            if (selectedIds.length > 0) {
                selectedIds = normalizeSelectedLineIdsForWaterSewer(selectedIds, linesById);
            } else {
                selectedIds = defaultLineOrder.slice();
            }

            let remaining = app.amount;
            const lineAmounts = {};
            for (const lineId of selectedIds) {
                if (!(remaining > 0)) break;
                const line = linesById.get(lineId);
                if (!line) continue;
                const total = Number(line.amount_total || 0);
                const alreadyPaid = Number(linePaid.get(lineId) || 0);
                const capacity = Math.max(0, total - alreadyPaid);
                if (!(capacity > 0)) continue;
                const take = Math.min(capacity, remaining);
                if (take > 0) {
                    lineAmounts[lineId] = (lineAmounts[lineId] || 0) + take;
                    linePaid.set(lineId, alreadyPaid + take);
                    remaining -= take;
                }
            }
            appLineAllocations.set(app.id, lineAmounts);
        });

        const snapshot = { linesById, appLineAllocations };
        invoiceAllocationCache.set(id, snapshot);
        return snapshot;
    }

    async function buildPaymentServiceBreakdown(payment) {
        const result = {};
        const apps = Array.isArray(payment.applications) ? payment.applications : [];

        if (apps.length === 0) {
            result.unallocated = Number(payment.amount_total || 0);
            return result;
        }

        for (const app of apps) {
            const appId = Number(app?.id || 0);
            const appAmount = Number(app?.amount_applied || 0);
            const invoiceId = Number(app?.invoice_id || 0);
            if (!(appAmount > 0) || !(invoiceId > 0)) continue;

            const snapshot = await getInvoiceAllocationSnapshot(invoiceId);
            const lineAmounts = snapshot.appLineAllocations.get(appId) || {};
            let allocated = 0;

            Object.entries(lineAmounts).forEach(([lineIdRaw, lineAmountRaw]) => {
                const lineAmount = Number(lineAmountRaw || 0);
                if (!(lineAmount > 0)) return;
                const lineId = Number(lineIdRaw);
                const line = snapshot.linesById.get(lineId);
                const serviceKey = classifyServiceByDescription(line?.description);
                result[serviceKey] = (result[serviceKey] || 0) + lineAmount;
                allocated += lineAmount;
            });

            if (allocated < appAmount) {
                result.unallocated = (result.unallocated || 0) + (appAmount - allocated);
            }
        }

        const hasAny = Object.values(result).some((v) => Number(v) > 0);
        if (!hasAny) {
            result.unallocated = Number(payment.amount_total || 0);
        }
        return result;
    }

    function paymentMatchesExportFilters(payment, selectedServices, extraFilters, serviceBreakdown) {
        const amount = Number(payment.amount_total || 0);
        if (extraFilters.minAmount !== null && amount < extraFilters.minAmount) return false;
        if (extraFilters.maxAmount !== null && amount > extraFilters.maxAmount) return false;

        if (extraFilters.allocatedOnly) {
            const apps = Array.isArray(payment.applications) ? payment.applications : [];
            if (apps.length === 0) return false;
        }

        const serviceKeys = Object.keys(serviceBreakdown).filter((k) => Number(serviceBreakdown[k]) > 0);
        if (serviceKeys.length === 0) return false;

        const utilitySelected = selectedServices.includes('utility');
        if (utilitySelected && getUtilityAmount(serviceBreakdown) > 0) {
            return true;
        }
        return serviceKeys.some((k) => selectedServices.includes(k));
    }

    function formatServiceBreakdown(serviceBreakdown, selectedServices) {
        const parts = [];
        const utilitySelected = selectedServices.includes('utility');
        const utilityAmount = getUtilityAmount(serviceBreakdown);
        if (utilitySelected && utilityAmount > 0) {
            parts.push(`${getServiceRowLabel('utility')}: ${toMoney(utilityAmount)} ₼`);
        }

        Object.entries(serviceBreakdown)
            .filter(([key, value]) => selectedServices.includes(key) && Number(value) > 0)
            .sort((a, b) => Number(b[1]) - Number(a[1]))
            .forEach(([key, value]) => {
                if (utilitySelected && utilityServiceKeys.includes(key)) return;
                parts.push(`${getServiceRowLabel(key)}: ${toMoney(value)} ₼`);
            });

        return parts.length ? parts.join('; ') : '—';
    }

    function buildExportFiltersText(selectedServices, extraFilters) {
        const chunks = [];
        const resident = document.getElementById('filterResident');
        if (resident && resident.value && resident.value !== 'all') {
            chunks.push(`${t('payments_export_filters_resident', 'Резидент')}: ${resident.options[resident.selectedIndex]?.text || resident.value}`);
        }
        const method = document.getElementById('filterMethod');
        if (method && method.value && method.value !== 'all') {
            chunks.push(`${t('payments_export_filters_method', 'Метод')}: ${method.options[method.selectedIndex]?.text || method.value}`);
        }
        const dateFrom = document.getElementById('filterDateFrom')?.value;
        const dateTo = document.getElementById('filterDateTo')?.value;
        if (dateFrom || dateTo) {
            chunks.push(`${t('payments_export_filters_period', 'Период')}: ${dateFrom || '...'} — ${dateTo || '...'}`);
        }
        const search = document.getElementById('filterSearch')?.value?.trim();
        if (search) chunks.push(`${t('payments_export_filters_search', 'Поиск')}: "${search}"`);
        if (extraFilters.minAmount !== null || extraFilters.maxAmount !== null) {
            chunks.push(`${t('payments_export_filters_amount', 'Сумма')}: ${extraFilters.minAmount ?? '...'} — ${extraFilters.maxAmount ?? '...'}`);
        }
        if (extraFilters.allocatedOnly) {
            chunks.push(t('payments_export_filters_allocated_only', 'Только распределенные платежи'));
        }
        chunks.push(`${t('payments_export_filters_services', 'Услуги')}: ${selectedServices.map((k) => getServiceDisplayLabel(k)).join(', ')}`);
        return chunks.join(' | ');
    }

    function extractPaymentInvoiceText(payment) {
        if ((payment?.method || '').toUpperCase() === 'ADVANCE') {
            return '—';
        }
        const apps = Array.isArray(payment?.applications) ? payment.applications : [];
        if (!apps.length) return '—';
        const invoiceAmounts = new Map();

        apps.forEach((app) => {
            const number = String(app?.invoice_number || '').trim();
            if (!number) return;
            const amount = Number(app?.amount_applied || 0);
            invoiceAmounts.set(number, (invoiceAmounts.get(number) || 0) + (Number.isFinite(amount) ? amount : 0));
        });

        if (!invoiceAmounts.size) return '—';
        return Array.from(invoiceAmounts.entries())
            .map(([number, amount]) => `${number} -> ${toMoney(amount)} ₼`)
            .join(' | ');
    }

    async function buildPaymentInvoiceAllocations(payment, selectedServices) {
        if ((payment?.method || '').toUpperCase() === 'ADVANCE') {
            return [{ invoice: '—', services: '—', serviceBreakdown: {} }];
        }

        const apps = Array.isArray(payment?.applications) ? payment.applications : [];
        if (!apps.length) {
            return [{ invoice: '—', services: '—' }];
        }

        const byInvoice = new Map();
        apps.forEach((app) => {
            const invoiceId = Number(app?.invoice_id || 0);
            const invoiceNumber = String(app?.invoice_number || '').trim() || `INV-${invoiceId}`;
            const amount = Number(app?.amount_applied || 0);
            if (!(invoiceId > 0) || !(amount > 0)) return;

            const key = `${invoiceId}:${invoiceNumber}`;
            const prev = byInvoice.get(key) || { invoiceId, invoiceNumber, appliedAmount: 0, appIds: [] };
            prev.appliedAmount += amount;
            prev.appIds.push(Number(app?.id || 0));
            byInvoice.set(key, prev);
        });

        if (!byInvoice.size) {
            return [{ invoice: '—', services: '—', serviceBreakdown: {} }];
        }

        const allocations = [];
        for (const item of byInvoice.values()) {
            const invoiceServiceBreakdown = {};
            let allocated = 0;

            const snapshot = await getInvoiceAllocationSnapshot(item.invoiceId);
            item.appIds.forEach((appId) => {
                const lineAmounts = snapshot.appLineAllocations.get(appId) || {};
                Object.entries(lineAmounts).forEach(([lineIdRaw, lineAmountRaw]) => {
                    const lineAmount = Number(lineAmountRaw || 0);
                    if (!(lineAmount > 0)) return;
                    const lineId = Number(lineIdRaw);
                    const line = snapshot.linesById.get(lineId);
                    const serviceKey = classifyServiceByDescription(line?.description);
                    invoiceServiceBreakdown[serviceKey] = (invoiceServiceBreakdown[serviceKey] || 0) + lineAmount;
                    allocated += lineAmount;
                });
            });

            if (allocated < item.appliedAmount) {
                invoiceServiceBreakdown.unallocated = (invoiceServiceBreakdown.unallocated || 0) + (item.appliedAmount - allocated);
            }

            const services = formatServiceBreakdown(invoiceServiceBreakdown, selectedServices);
            allocations.push({
                invoice: `${item.invoiceNumber} ->`,
                services,
                serviceBreakdown: invoiceServiceBreakdown
            });
        }

        return allocations.length ? allocations : [{ invoice: '—', services: '—', serviceBreakdown: {} }];
    }

    function joinAllocationPartsForCell(parts) {
        const values = (parts || []).map((v) => String(v || '—')).filter(Boolean);
        if (!values.length) return '—';
        if (values.length === 1) return values[0];
        return values.join(' | ');
    }

    async function buildExportDataset(items, selectedServices, extraFilters) {
        const rows = [];
        const serviceStats = {};
        serviceKeys.forEach((key) => {
            serviceStats[key] = { count: 0, amount: 0 };
        });

        let totalAmount = 0;
        for (const payment of items) {
            const serviceBreakdown = await buildPaymentServiceBreakdown(payment);
            if (!paymentMatchesExportFilters(payment, selectedServices, extraFilters, serviceBreakdown)) {
                continue;
            }

            const amount = Number(payment.amount_total || 0);
            totalAmount += amount;

            const utilitySelected = selectedServices.includes('utility');
            const utilityAmount = getUtilityAmount(serviceBreakdown);
            const countedForThisPayment = new Set();
            Object.entries(serviceBreakdown).forEach(([key, value]) => {
                const numeric = Number(value || 0);
                if (!(numeric > 0) || !selectedServices.includes(key)) return;
                if (utilitySelected && utilityServiceKeys.includes(key)) return;
                serviceStats[key].amount += numeric;
                if (!countedForThisPayment.has(key)) {
                    serviceStats[key].count += 1;
                    countedForThisPayment.add(key);
                }
            });

            if (utilitySelected && utilityAmount > 0) {
                serviceStats.utility.amount += utilityAmount;
                serviceStats.utility.count += 1;
            }

            const selectedAmount = Object.entries(serviceBreakdown).reduce((acc, [key, value]) => {
                const numeric = Number(value || 0);
                if (!(numeric > 0)) return acc;
                if (!selectedServices.includes(key)) return acc;
                if (utilitySelected && utilityServiceKeys.includes(key)) return acc;
                return acc + numeric;
            }, 0) + ((utilitySelected && utilityAmount > 0) ? utilityAmount : 0);

            const invoiceAllocations = await buildPaymentInvoiceAllocations(payment, selectedServices);
            const invoiceCell = joinAllocationPartsForCell(invoiceAllocations.map((a) => a.invoice));
            const servicesCell = joinAllocationPartsForCell(invoiceAllocations.map((a) => a.services));

            const serviceFlags = {};
            selectedServices.forEach((key) => {
                let amountForKey = 0;
                if (key === 'utility') {
                    amountForKey = getUtilityAmount(serviceBreakdown);
                } else {
                    amountForKey = Number(serviceBreakdown[key] || 0);
                }
                serviceFlags[key] = amountForKey;
            });

            rows.push({
                date: formatExportDate(payment.received_at),
                resident: payment.resident_code || '—',
                resident_user_full_name: payment.resident_user_full_name || '—',
                amount: toMoney(payment.amount_total),
                method: getMethodLabel(payment.method),
                leftover: toMoney(payment.leftover),
                reference: getReferenceLabel(payment.reference),
                invoice: invoiceCell,
                services: servicesCell,
                invoice_allocations: invoiceAllocations,
                serviceAmounts: serviceFlags,
                selected_services_amount: toMoney(selectedAmount),
            });
        }

        return {
            rows,
            summary: {
                selectedServices,
                serviceStats,
                totalPayments: rows.length,
                totalAmount: toMoney(totalAmount),
                filtersText: buildExportFiltersText(selectedServices, extraFilters),
            }
        };
    }

    function formatExportDate(dateStr) {
        if (!dateStr) return '—';
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return String(dateStr);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        const ss = String(d.getSeconds()).padStart(2, '0');
        // Prefix with tab to force Excel to keep text and avoid "####"
        return `\t${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
    }

    function buildPaymentPageList(current, total) {
        if (total <= 5) {
            return Array.from({ length: total }, (_, i) => i + 1);
        }
        const pages = new Set([1, total]);
        if (current <= 3) {
            [2, 3, 4, 5].forEach(p => pages.add(p));
        } else if (current >= total - 2) {
            [total - 1, total - 2, total - 3, total - 4].forEach(p => pages.add(p));
        } else {
            [current - 2, current - 1, current, current + 1, current + 2].forEach(p => pages.add(p));
        }
        const sorted = Array.from(pages).filter(p => p >= 1 && p <= total).sort((a, b) => a - b);
        const result = [];
        for (let i = 0; i < sorted.length; i++) {
            const page = sorted[i];
            result.push(page);
            const next = sorted[i + 1];
            if (next && next - page > 1) {
                result.push('dots');
            }
        }
        return result;
    }

    // Update pagination UI
    function updatePaginationUI() {
        const currentPageEl = document.getElementById('paymentCurrentPage');
        const totalPagesEl = document.getElementById('paymentTotalPages');
        const totalItemsEl = document.getElementById('paymentTotalItems');
        const prevBtn = document.getElementById('paymentPrevBtn');
        const nextBtn = document.getElementById('paymentNextBtn');
        const pagesContainer = document.getElementById('paymentPageButtons');
        
        if (currentPageEl) currentPageEl.textContent = paginationState.currentPage;
        if (totalPagesEl) totalPagesEl.textContent = paginationState.totalPages;
        if (totalItemsEl) totalItemsEl.textContent = paginationState.totalItems;
        if (prevBtn) prevBtn.disabled = paginationState.currentPage <= 1;
        if (nextBtn) nextBtn.disabled = paginationState.currentPage >= paginationState.totalPages;

        if (!pagesContainer) return;
        pagesContainer.innerHTML = '';

        const pages = buildPaymentPageList(paginationState.currentPage, paginationState.totalPages);
        pages.forEach(p => {
            const btn = document.createElement('button');
            btn.className = 'btn-pagination';

            if (p === 'dots') {
                btn.textContent = '...';
                btn.disabled = true;
                btn.classList.add('dots');
            } else {
                btn.textContent = p;
                if (p > paginationState.totalPages) {
                    btn.disabled = true;
                } else {
                    btn.onclick = () => {
                        if (p !== paginationState.currentPage) {
                            goToPaymentPage(p);
                        }
                    };
                }
                if (p === paginationState.currentPage) {
                    btn.classList.add('active');
                    btn.setAttribute('aria-current', 'page');
                }
            }

            pagesContainer.appendChild(btn);
        });
    }

            if (paginationState.currentPage < paginationState.totalPages) {

            }
        } else if (typeof page === 'number') {
            paginationState.currentPage = page;
            loadPayments();
        }
    };

    // Load residents for filters and modal (учитываем пагинацию API)
    async function loadResidents() {
        if (!isPaymentsRoute() && !hasPaymentsDom()) return;
        try {
            const perPage = 100;
            let page = 1;
            let allResidents = [];
            let lastPage = 1;

            while (page <= lastPage) {
                let url = `${API_BASE}/api/residents?per_page=${perPage}&page=${page}`;
                let response = await fetch(url, { credentials: 'include' });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const items = Array.isArray(data) ? data : (data.items || data.residents || []);
                allResidents = allResidents.concat(items);

                const pagination = data.pagination || {};
                lastPage = pagination.last_page || 1;
                page += 1;
            }

            residents = allResidents;
            console.log('Loaded residents for payments:', residents.length);

            // Populate filter dropdown
            const filterResident = document.getElementById('filterResident');
            if (filterResident && filterResident.tagName === 'SELECT') {
                filterResident.innerHTML = `<option value="all" data-i18n="all">${t('all', 'Все')}</option>` +
                    residents.map(r => `<option value="${r.id}">${r.block_name} / ${r.unit_number}</option>`).join('');
            }

            // Populate modal dropdown
            const paymentResident = document.getElementById('paymentResident');
            if (paymentResident && paymentResident.tagName === 'SELECT') {
                paymentResident.innerHTML = `<option value="">${t('payments_select_resident', 'Выберите резидента')}</option>` +
                    residents.map(r => `<option value="${r.id}">${r.block_name} / ${r.unit_number}</option>`).join('');
            }
        } catch (error) {
            console.error('Error loading residents:', error);
            residents = [];
        }
    }

    window.savePayment = async function(event) {
        if (event) {
            event.preventDefault();
        }
        
        const form = document.getElementById('acceptPaymentForm');
        if (!form) return;
        
        // Get form values
        const residentId = parseInt(document.getElementById('paymentResident').value);
        const date = document.getElementById('paymentDate').value;
        const amount = parseFloat(document.getElementById('paymentAmount').value);
        const method = document.getElementById('paymentMethod').value;
        const reference = document.getElementById('paymentReference').value.trim();
        const comment = document.getElementById('paymentComment').value.trim();
        const checkNumber = document.getElementById('paymentCheckNumber').value.trim();
        
        // Validate required fields
        if (!residentId || !date || !amount || !method) {
            if (typeof showWarning === 'function') {
                showWarning(t('payments_fill_required_fields', 'Пожалуйста, заполните все обязательные поля!'));
            }
            return;
        }
        
        if (amount <= 0) {
            if (typeof showWarning === 'function') {
                showWarning(t('payments_amount_positive', 'Сумма должна быть больше нуля!'));
            }
            return;
        }
        
        // Create payment object
        const paymentData = {
            resident_id: residentId,
            received_at: date,
            amount_total: amount,
            method: method,
            reference: reference || checkNumber || null,
            comment: comment || null
        };
        
        try {
            let response = await fetch(`${API_BASE}/api/payments`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(paymentData),
                credentials: 'include'
            });
            
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({ detail: 'Unknown error' }));
                throw new Error(errorData.detail || `HTTP error! status: ${response.status}`);
            }
            
            const result = await response.json();
            
            // Close modal
            closeAcceptPaymentModal();
            
            // Reload payments
            loadPayments();
            
            // Show success message
            if (typeof showSuccess === 'function') {
                showSuccess(t('payments_accept_success', 'Платеж успешно принят!'));
            }
            
            // Open payment view
            if (result.id) {
                setTimeout(() => {
                    viewPayment(result.id);
                }, 500);
            }
        } catch (error) {
            console.error('Error saving payment:', error);
            if (typeof showError === 'function') {
                showError(`${t('payments_save_error_prefix', 'Ошибка сохранения платежа')}: ${error.message}`);
            }
        }
    };

            options.forEach(opt => {
                opt.classList.remove('selected');
                if (opt.dataset.value === selectedValue) {
                    opt.classList.add('selected');
                }
            });
        }
        
        selectBtn.onclick = function(e) {
            e.stopPropagation();
            customSelect.classList.toggle('open');
        };
        
        options.forEach(option => {
            option.onclick = function(e) {
                e.stopPropagation();
                const value = option.dataset.value;
                if (nativeSelect) {
                    nativeSelect.value = value;
                    nativeSelect.dispatchEvent(new Event('change', { bubbles: true }));
                }
                selectText.textContent = value;
                options.forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                customSelect.classList.remove('open');
            };
        });
        
        document.addEventListener('click', function(e) {
            if (!customSelect.contains(e.target)) {
                customSelect.classList.remove('open');
            }
        });
    }
    
    // Инициализация фильтров (БЕЗ автоматического применения)
    // Фильтрация происходит ТОЛЬКО при нажатии на кнопку "Фильтр" или Enter в поле поиска
    function initFilters() {
        // Убираем все автоматические обработчики событий (onchange, oninput)
        // Фильтрация будет происходить только при нажатии на кнопку "Фильтр"
        initServiceExportFilters();
        
        // Добавляем обработчик Enter для поля поиска (удобство для пользователя)
        const searchInput = document.getElementById('filterSearch');
        if (searchInput) {
            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    applyPaymentFilters();
                }
            });
        }
        
        // Инициализируем только pagination dropdown
        setTimeout(() => {
            initCustomPaginationDropdown();
        }, 500);
    }
    
    // ПРИНУДИТЕЛЬНО ПРИМЕНИТЬ СЕРЫЙ ФОН В DARK THEME
    function applyDarkThemeStyles() {
        if (document.documentElement.getAttribute('data-theme') === 'dark' || 
            document.body.getAttribute('data-theme') === 'dark') {
            const filtersSection = document.querySelector('.payments-filters');
            
            if (filtersSection) {
                filtersSection.style.setProperty('background', '#242831', 'important');
                filtersSection.style.setProperty('background-color', '#242831', 'important');
                filtersSection.style.setProperty('border', 'none', 'important');
                filtersSection.style.setProperty('color', '#e4e6eb', 'important');
            }

            // Применить темный фон к карточке таблицы
            const card = document.querySelector('.payments-page .card');
            if (card) {
                card.style.setProperty('background', 'rgba(36, 40, 49, 0.95)', 'important');
                card.style.setProperty('background-color', 'rgba(36, 40, 49, 0.95)', 'important');
                // card.style.setProperty('border', 'none', 'important');
                card.style.setProperty('box-shadow', 'none', 'important');
                card.style.setProperty('-webkit-box-shadow', 'none', 'important');
            }

            const cardBody = document.querySelector('.payments-page .card-body');
            if (cardBody) {
                cardBody.style.setProperty('background', 'transparent', 'important');
                cardBody.style.setProperty('color', '#e4e6eb', 'important');
            }

            // Скрыть границу и фон у .content-wrapper.payments-page
            const contentWrapper = document.querySelector('.content-wrapper.payments-page');
            if (contentWrapper) {
                contentWrapper.style.setProperty('border', 'none', 'important');
                contentWrapper.style.setProperty('border-width', '0', 'important');
                contentWrapper.style.setProperty('outline', 'none', 'important');
                contentWrapper.style.setProperty('box-shadow', 'none', 'important');
                contentWrapper.style.setProperty('background', 'transparent', 'important');
                contentWrapper.style.setProperty('background-color', 'transparent', 'important');
                contentWrapper.style.setProperty('backdrop-filter', 'none', 'important');
                contentWrapper.style.setProperty('-webkit-backdrop-filter', 'none', 'important');
            }

            // Применить серый фон к select и option элементам
            const selectElements = document.querySelectorAll('.payments-filters-group select');
            selectElements.forEach(select => {
                select.style.setProperty('background', 'rgba(255, 255, 255, 0.05)', 'important');
                select.style.setProperty('background-color', 'rgba(255, 255, 255, 0.05)', 'important');
                select.style.setProperty('color', '#fefefe', 'important');
                
                // Применить стили к option элементам
                const options = select.querySelectorAll('option');
                options.forEach(option => {
                    option.style.setProperty('background', '#242831', 'important');
                    option.style.setProperty('background-color', '#242831', 'important');
                    option.style.setProperty('color', '#f6f7ff', 'important');
                });
            });

            // Инъекция CSS для белого плейсхолдера date input
            const dateInputStyleId = 'payments-date-input-placeholder-white';
            if (!document.getElementById(dateInputStyleId)) {
                const style = document.createElement('style');
                style.id = dateInputStyleId;
                style.textContent = `
                    [data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-text,
                    [data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-month-field,
                    [data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-day-field,
                    [data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-year-field,
                    body[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-text,
                    body[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-month-field,
                    body[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-day-field,
                    body[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-year-field,
                    html[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-text,
                    html[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-month-field,
                    html[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-day-field,
                    html[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-year-field {
                        color: #ffffff !important;
                    }
                `;
                document.head.appendChild(style);
            }
        }
    }
    
    // Функция для скрытия границы у content-wrapper
    function hideContentWrapperBorder() {
        const contentWrapper = document.querySelector('.content-wrapper.payments-page');
        if (contentWrapper) {
            contentWrapper.style.setProperty('border', 'none', 'important');
            contentWrapper.style.setProperty('border-width', '0', 'important');
            contentWrapper.style.setProperty('outline', 'none', 'important');
            contentWrapper.style.setProperty('box-shadow', 'none', 'important');
            contentWrapper.style.setProperty('background', 'transparent', 'important');
            contentWrapper.style.setProperty('background-color', 'transparent', 'important');
            contentWrapper.style.setProperty('background-image', 'none', 'important');
            contentWrapper.style.setProperty('backdrop-filter', 'none', 'important');
            contentWrapper.style.setProperty('-webkit-backdrop-filter', 'none', 'important');
        }
    }
    
    // Применить сразу
    applyDarkThemeStyles();
    hideContentWrapperBorder();
    
    // Применить после загрузки DOM
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            applyDarkThemeStyles();
            setTimeout(hideContentWrapperBorder, 100);
            setTimeout(hideContentWrapperBorder, 500);
            setTimeout(hideContentWrapperBorder, 1000);
        });
    }
    
    // Применить с задержкой на случай, если стили загружаются асинхронно
    setTimeout(() => {
        applyDarkThemeStyles();
        hideContentWrapperBorder();
    }, 100);
    setTimeout(() => {
        applyDarkThemeStyles();
        hideContentWrapperBorder();
    }, 500);
    setTimeout(() => {
        applyDarkThemeStyles();
        hideContentWrapperBorder();
    }, 1000);

    // Повторно применять стили при открытии select (для выпадающих списков)
    document.addEventListener('DOMContentLoaded', function() {
        const selectElements = document.querySelectorAll('.payments-filters-group select');
        selectElements.forEach(select => {
            select.addEventListener('mousedown', function() {
                setTimeout(applyDarkThemeStyles, 10);
            });
            select.addEventListener('focus', function() {
                setTimeout(applyDarkThemeStyles, 10);
            });
            select.addEventListener('change', function() {
                setTimeout(applyDarkThemeStyles, 10);
            });
        });
    });
    
    // Initialize on page load
    function initPaymentsPage() {
        if (!isPaymentsRoute() && !hasPaymentsDom()) return;
        loadResidents().then(() => {
            loadPayments();
            initFilters();
        });
    }
    
    // Listen for SPA content loaded event
    // Удаляем старый обработчик, если он существует
    if (window._paymentsContentLoadedHandler) {
        document.removeEventListener('spa:contentLoaded', window._paymentsContentLoadedHandler);
    }
    
    window._paymentsContentLoadedHandler = function() {
        if (!isPaymentsRoute()) return;
        initPaymentsPage();
    };
    
    if (window._paymentsLanguageChangedHandler) {
        window.removeEventListener('languageChanged', window._paymentsLanguageChangedHandler);
    }
    window._paymentsLanguageChangedHandler = function() {
        if (!isPaymentsRoute()) return;
        updateServiceSummaryLabel();
        renderTable();
        loadResidents();
    };
    window.addEventListener('languageChanged', window._paymentsLanguageChangedHandler);
    
    document.addEventListener('spa:contentLoaded', window._paymentsContentLoadedHandler);
    
    // Initial load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPaymentsPage);
    } else {
        initPaymentsPage();
    }
})();
</script>
