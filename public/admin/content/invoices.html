<link rel="stylesheet" href="/admin/content_css/invoice.css">
<div class="content-wrapper invoices-page" style="padding-top: 0 !important;">
    <!-- Actions Section -->
    <div class="invoices-actions">
        <div class="invoices-actions-row">
            <div class="invoices-actions-group">
                <label data-i18n="invoices_block_label">Блок (для «по блоку»)</label>

                    <option value="" data-i18n="invoices_select_block">— выберите блок —</option>
                    <option value="A">Блок A</option>
                    <option value="B">Блок B</option>
                    <option value="K">Блок K</option>
                    <option value="X">Блок X</option>
                    <option value="Z">Блок Z</option>
                </select>
            </div>
            
            <div class="invoices-actions-group">
                <label data-i18n="invoices_due_date_label">Срок оплаты (due date)</label>
                <div class="date-input-wrapper">
                    <input type="date" id="invoiceDueDate" class="date-picker-input">
                    <button type="button" class="btn-calendar" onclick="openDatePicker('invoiceDueDate')" title="Открыть календарь" data-i18n-title="open_calendar">
                        <i class="bi bi-calendar"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="invoices-actions-row">
            <div class="invoices-actions-buttons">
                <button class="btn btn-outline-primary" onclick="issueInvoiceByBlock()" data-i18n="invoices_issue_by_block">
                    Выставить счёт по блоку
                </button>
                <button class="btn btn-primary" onclick="issueAllInvoices()" data-i18n="invoices_issue_all">
                    Выставить все счета
                </button>
            </div>
        </div>
    </div>

    <!-- Filters Section -->
    <div class="invoices-filters">
        <div class="invoices-filters-row">
            <div class="invoices-filters-group">
                <label data-i18n="year">Год</label>
                <input
                    type="number"
                    id="filterYear"
                    min="2000"
                    max="2100"
                    step="1"
                    placeholder="Все годы"
                    data-i18n-placeholder="invoices_filter_year_placeholder">
            </div>
            
            <div class="invoices-filters-group">
                <label data-i18n="month">Месяц</label>
                <input
                    type="number"
                    id="filterMonth"
                    min="1"
                    max="12"
                    step="1"
                    placeholder="1-12"
                    data-i18n-placeholder="invoices_filter_month_placeholder">
            </div>
            
            <div class="invoices-filters-group">
                <label data-i18n="resident">Резидент</label>
                <select id="filterResident">
                    <option value="all" data-i18n="all">Все</option>
                    <option value="1">Резидент 1</option>
                    <option value="2">Резидент 2</option>
                </select>
            </div>
            
            <div class="invoices-filters-group">
                <label data-i18n="status">Статус</label>
                <select id="filterStatus">
                    <option value="all" data-i18n="all">Все</option>
                    <option value="paid" data-i18n="invoices_status_paid">Оплачен</option>
                    <option value="unpaid" data-i18n="invoices_status_unpaid">Не оплачен</option>
                    <option value="overdue" data-i18n="invoices_status_overdue">Просрочен</option>
                    <option value="draft" data-i18n="invoices_status_draft">Черновик</option>
                    <option value="issued" data-i18n="invoices_status_issued">Выставлен</option>
                    <option value="partial" data-i18n="invoices_status_partial">Частично оплачен</option>
                    <option value="overpaid" data-i18n="invoices_status_overpaid">Переплата</option>
                    <option value="canceled" data-i18n="invoices_status_canceled">Отменён</option>
                </select>
            </div>
            <div class="invoices-filters-group">
                <label data-i18n="filter">Поиск</label>
                <input type="text" id="filterSearch" placeholder="№ или примечание" data-i18n-placeholder="invoices_search_placeholder">
            </div>
        </div>
        
        <div class="invoices-filters-actions">
            <button class="btn btn-outline-secondary" onclick="applyInvoiceFilters()">

            <button class="btn btn-outline-warning" onclick="clearInvoiceFilters()">

    <div class="invoices-export-toolbar d-flex justify-content-end">

            <div class="invoices-filters-group">

            <div class="invoices-filters-group">
                <label data-i18n="invoices_service_type">Тип услуги</label>
                <details class="multi-filter service-filter-details" id="exportInvoiceMeterTypeDetails">
                    <summary class="multi-filter-summary" id="exportInvoiceMeterTypeSummary" data-i18n="payments_services_all_categories">Все категории</summary>

                            <label class="multi-filter-item"><input type="checkbox" class="export-invoice-meter-type-checkbox" value="ELECTRIC" checked><span data-i18n="meter_electricity">Электричество</span></label>
                            <label class="multi-filter-item"><input type="checkbox" class="export-invoice-meter-type-checkbox" value="GAS" checked><span data-i18n="meter_gas">Газ</span></label>
                            <label class="multi-filter-item"><input type="checkbox" class="export-invoice-meter-type-checkbox" value="WATER" checked><span data-i18n="meter_cold_water">Вода</span></label>
                            <label class="multi-filter-item"><input type="checkbox" class="export-invoice-meter-type-checkbox" value="SEWERAGE" checked><span data-i18n="readings_meter_sewerage">Канализация</span></label>
                            <label class="multi-filter-item"><input type="checkbox" class="export-invoice-meter-type-checkbox" value="SERVICE" checked><span data-i18n="tariffs_purpose_service">Сервис</span></label>
                            <label class="multi-filter-item"><input type="checkbox" class="export-invoice-meter-type-checkbox" value="RENT" checked><span data-i18n="tariffs_purpose_rent">Аренда</span></label>
                            <label class="multi-filter-item"><input type="checkbox" class="export-invoice-meter-type-checkbox" value="CONSTRUCTION" checked><span data-i18n="tariffs_purpose_construction">Строительство</span></label>
                        </div>
                        <div class="service-filter-actions">
                            <button type="button" class="btn-filter-mini" id="exportInvoiceMeterSelectAllBtn" data-i18n="select_all">Выбрать все</button>
                            <button type="button" class="btn-filter-mini" id="exportInvoiceMeterOkBtn">OK</button>
                            <button type="button" class="btn-filter-mini" id="exportInvoiceMeterClearBtn" data-i18n="clear">Очистить</button>
                        </div>
                    </div>
                </details>
            </div>
        </div>
        <div class="invoices-export-actions">
            <select id="invoicesExportFormat" class="form-select form-select-sm" style="max-width: 170px;">
                <option value="xls">Excel (Styled)</option>
                <option value="pdf">PDF (печать)</option>
            </select>
            <button class="btn btn-outline-warning" type="button" id="invoicesExportResetBtn">
                <i class="bi bi-x-circle"></i> <span data-i18n="reset">Сброс</span>
            </button>
            <button class="btn btn-success" type="button" id="invoicesExportRunBtn">
                <i class="bi bi-box-arrow-down"></i> <span data-i18n="export">Экспорт</span>
            </button>
        </div>
    </div>

    <div style="position: relative; overflow: visible; padding-bottom: 100px;">
<!-- Invoices Table -->
<div class="card">

    </div>

</div>

            <span class="select-text">25</span>

            <div class="select-option" data-value="10">10</div>
            <div class="select-option selected" data-value="25">25</div>
            <div class="select-option" data-value="50">50</div>

</div>
</div>
</div>

<script>
(function(){
    const t = (key, fallback = '') => window.i18n?.translate?.(key) || fallback || key;
    // ПРИНУДИТЕЛЬНО ПРИМЕНИТЬ СЕРЫЙ ФОН В DARK THEME
    function applyDarkThemeStyles() {
        if (document.documentElement.getAttribute('data-theme') === 'dark' || 
            document.body.getAttribute('data-theme') === 'dark') {
            const actionsSection = document.querySelector('.invoices-actions');
            const filtersSection = document.querySelector('.invoices-filters');
            
            if (actionsSection) {
                actionsSection.style.setProperty('background', '#242831', 'important');
                actionsSection.style.setProperty('background-color', '#242831', 'important');
                actionsSection.style.setProperty('border', '1px solid rgba(255, 255, 255, 0.08)', 'important');
                actionsSection.style.setProperty('color', '#e4e6eb', 'important');
            }
            
            if (filtersSection) {
                filtersSection.style.setProperty('background', '#242831', 'important');
                filtersSection.style.setProperty('background-color', '#242831', 'important');
                filtersSection.style.setProperty('border', '1px solid rgba(255, 255, 255, 0.08)', 'important');
                filtersSection.style.setProperty('color', '#e4e6eb', 'important');
            }

            // Применить серый фон к select и option элементам
            const selectElements = document.querySelectorAll('.invoices-actions-group select, .invoices-filters-group select');
            selectElements.forEach(select => {
                select.style.setProperty('background', 'rgba(255, 255, 255, 0.05)', 'important');
                select.style.setProperty('background-color', 'rgba(255, 255, 255, 0.05)', 'important');
                select.style.setProperty('color', '#fefefe', 'important');
                
                // Применить стили к option элементам
                const options = select.querySelectorAll('option');
                options.forEach(option => {
                    option.style.setProperty('background', '#242831', 'important');
                    option.style.setProperty('background-color', '#242831', 'important');
                    option.style.setProperty('color', '#f6f7ff', 'important');
                });
            });

            // Инъекция CSS для белого плейсхолдера date input
            const dateInputStyleId = 'date-input-placeholder-white';
            if (!document.getElementById(dateInputStyleId)) {
                const style = document.createElement('style');
                style.id = dateInputStyleId;
                style.textContent = `
                    [data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-text,
                    [data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-month-field,
                    [data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-day-field,
                    [data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-year-field,
                    body[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-text,
                    body[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-month-field,
                    body[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-day-field,
                    body[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-year-field,
                    html[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-text,
                    html[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-month-field,
                    html[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-day-field,
                    html[data-theme="dark"] .date-input-wrapper input[type="date"]::-webkit-datetime-edit-year-field {
                        color: #ffffff !important;
                    }
                    [data-theme="dark"] .date-input-wrapper input[type="date"]:invalid::-webkit-datetime-edit-text,
                    [data-theme="dark"] .date-input-wrapper input[type="date"]:invalid::-webkit-datetime-edit-month-field,
                    [data-theme="dark"] .date-input-wrapper input[type="date"]:invalid::-webkit-datetime-edit-day-field,
                    [data-theme="dark"] .date-input-wrapper input[type="date"]:invalid::-webkit-datetime-edit-year-field,
                    body[data-theme="dark"] .date-input-wrapper input[type="date"]:invalid::-webkit-datetime-edit-text,
                    body[data-theme="dark"] .date-input-wrapper input[type="date"]:invalid::-webkit-datetime-edit-month-field,
                    body[data-theme="dark"] .date-input-wrapper input[type="date"]:invalid::-webkit-datetime-edit-day-field,
                    body                    [data-theme="dark"] .date-input-wrapper input[type="date"]:invalid::-webkit-datetime-edit-year-field,
                    html[data-theme="dark"] .date-input-wrapper input[type="date"]:invalid::-webkit-datetime-edit-text,
                    html[data-theme="dark"] .date-input-wrapper input[type="date"]:invalid::-webkit-datetime-edit-month-field,
                    html[data-theme="dark"] .date-input-wrapper input[type="date"]:invalid::-webkit-datetime-edit-day-field,
                    html[data-theme="dark"] .date-input-wrapper input[type="date"]:invalid::-webkit-datetime-edit-year-field {
                        color: #ffffff !important;
                    }

                    /* Radio Tags Styles */
                    .radio-tag {
                        cursor: pointer;
                        position: relative;
                    }
                    .radio-tag input {
                        display: none;
                    }
                    .radio-tag span {
                        padding: 6px 12px;
                        background: rgba(255, 255, 255, 0.05);
                        border: 1px solid rgba(255, 255, 255, 0.1);
                        border-radius: 6px;
                        font-size: 0.85rem;
                        transition: all 0.2s;
                        display: inline-block;
                        color: rgba(255, 255, 255, 0.7);
                    }
                    .radio-tag input:checked + span {
                        background: #667eea;
                        border-color: #667eea;
                        color: white;
                        box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
                    }
                    .radio-tag:hover span {
                        background: rgba(255, 255, 255, 0.1);
                    }
                    #btnMonthlyIssue:disabled {
                        opacity: 0.4;
                        cursor: not-allowed;
                        filter: grayscale(1);
                    }
                `;
                document.head.appendChild(style);
            }
        }
    }
    
    // Применить сразу
    applyDarkThemeStyles();
    
    // Применить после загрузки DOM
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyDarkThemeStyles);
    }
    
    // Применить с задержкой на случай, если стили загружаются асинхронно
    setTimeout(applyDarkThemeStyles, 100);
    setTimeout(applyDarkThemeStyles, 500);
    setTimeout(applyDarkThemeStyles, 1000);

    // Повторно применять стили при открытии select (для выпадающих списков)
    document.addEventListener('DOMContentLoaded', function() {
        const selectElements = document.querySelectorAll('.invoices-actions-group select, .invoices-filters-group select');
        selectElements.forEach(select => {
            // Применить стили при клике (открытие dropdown)
            select.addEventListener('mousedown', function() {
                setTimeout(applyDarkThemeStyles, 10);
            });
            // Применить стили при фокусе
            select.addEventListener('focus', function() {
                setTimeout(applyDarkThemeStyles, 10);
            });
            // Применить стили при изменении
            select.addEventListener('change', function() {
                setTimeout(applyDarkThemeStyles, 10);
            });
        });
    });
    
    const statuses = {
        draft: {key: 'invoices_status_draft', cls: 'secondary'},
        issued: {key: 'invoices_status_issued', cls: 'info'},
        partial: {key: 'invoices_status_partial', cls: 'warning'},
        paid: {key: 'invoices_status_paid', cls: 'success'},
        overpaid: {key: 'invoices_status_overpaid', cls: 'info'},
        canceled: {key: 'invoices_status_canceled', cls: 'danger'},
        unpaid: {key: 'invoices_status_unpaid', cls: 'warning'},
        overdue: {key: 'invoices_status_overdue', cls: 'danger'},
    };
    
    // Store original data
    const API_BASE = window.getApiBase ? window.getApiBase() : (window.BACKEND_API_BASE || 'http://localhost:8000');
    let allInvoices = [];
    let filteredInvoices = [];
    let blocks = [];
    let residents = [];

    const INVOICE_EXPORT_METER_TYPES = ['ELECTRIC', 'GAS', 'WATER', 'SEWERAGE', 'SERVICE', 'RENT', 'CONSTRUCTION'];
    const INVOICE_EXPORT_UTILITY_TYPES = ['ELECTRIC', 'GAS', 'WATER', 'SEWERAGE'];
    function getInvoiceMeterLabel(type) {
        const key = String(type || '').trim();
        const map = {
            utility: ['payments_service_utility', 'Utility'],
            ELECTRIC: ['meter_electricity', 'Электричество'],
            GAS: ['meter_gas', 'Газ'],
            WATER: ['meter_cold_water', 'Вода'],
            SEWERAGE: ['readings_meter_sewerage', 'Канализация'],
            SERVICE: ['tariffs_purpose_service', 'Сервис'],
            RENT: ['tariffs_purpose_rent', 'Аренда'],
            CONSTRUCTION: ['tariffs_purpose_construction', 'Строительство']
        };
        const pair = map[key];
        return pair ? t(pair[0], pair[1]) : key;
    }
    const INVOICE_PAYMENT_METHOD_LABELS = {
        CASH: ['payments_method_cash', 'Наличные'],
        CARD: ['payments_method_card', 'Карта'],
        TRANSFER: ['payments_method_transfer', 'Перевод'],
        ONLINE: ['payments_method_online', 'Онлайн'],
        ADVANCE: ['payment_advance_badge', 'Аванс']
    };
    const INVOICE_STATUS_LABELS = {
        draft: ['invoices_status_draft', 'Черновик'],
        issued: ['invoices_status_issued', 'Выставлен'],
        partial: ['invoices_status_partial', 'Частично оплачен'],
        paid: ['invoices_status_paid', 'Оплачен'],
        unpaid: ['invoices_status_unpaid', 'Не оплачен'],
        overdue: ['invoices_status_overdue', 'Просрочен'],
        overpaid: ['invoices_status_overpaid', 'Переплата'],
        canceled: ['invoices_status_canceled', 'Отменён']
    };

    function getInvoicePaymentMethodLabel(methodCode) {
        const entry = INVOICE_PAYMENT_METHOD_LABELS[methodCode];

    function normalizeInvoiceFromApi(inv) {

            paid_amount: Number(line?.paid_amount || 0),

        })) : [];
        return {

            residentCode: inv.resident_code,
            residentInfo: inv.resident_info,
            residentUserFullName: inv.resident_user_full_name || '—',
            residentUserPhone: inv.resident_user_phone || '—',
            blockName: inv.block_name,
            unitNumber: inv.unit_number,
            invoiceNumber: inv.number || `INV-${inv.resident_id}/0/${inv.period_year}-${String(inv.period_month).padStart(2, '0')}`,
            number: inv.number,
            status: String(inv.status || '').toLowerCase(),
            dueDateRaw: inv.due_date || null,
            dueDate: inv.due_date ? new Date(inv.due_date).toLocaleDateString('ru-RU') : '—',
            notes: inv.notes || '',
            period: `${inv.period_year}-${String(inv.period_month).padStart(2, '0')}`,
            periodYear: inv.period_year,
            periodMonth: inv.period_month,
            amount: Number(inv.amount_total || 0),

            amountVat: Number(inv.amount_vat || 0),

            remaining: Number(inv.amount_total || 0) - Number(inv.paid_amount || 0),
            paymentMethods: Array.isArray(inv.payment_methods) ? inv.payment_methods.map((m) => String(m || '').toUpperCase()).filter(Boolean) : [],
            created_at: inv.created_at,
            lines: normalizedLines,
        };
    }

    window.loadInvoices = async function loadInvoices() {
        console.log('=== loadInvoices() called ===');

        // Safety: выходим, если мы не на странице счетов
        const invoicesPageRoot = document.querySelector('.content-wrapper.invoices-page');
        if (!invoicesPageRoot) {
            console.warn('loadInvoices(): not on invoices page, skipping DOM updates');
            return;
        }
        try {
            const year = document.getElementById('filterYear')?.value;
            const month = document.getElementById('filterMonth')?.value;
            const residentId = document.getElementById('filterResident')?.value;
            const status = document.getElementById('filterStatus')?.value;
            const search = document.getElementById('filterSearch')?.value;
            const page = paginationState.currentPage;
            const perPage = paginationState.itemsPerPage;
            
            console.log('Filters:', { year, month, residentId, status, search, page, perPage });
            
            let url = `${API_BASE}/api/invoices?page=${page}&per_page=${perPage}`;
            const params = new URLSearchParams();
            if (year && year.trim() !== '') params.append('year', year);
            if (month && month.trim() !== '') params.append('month', month);
            if (residentId && residentId !== 'all') params.append('resident_id', residentId);
            if (status && status !== 'all') params.append('status', status.toUpperCase());
            if (search && search.trim() !== '') params.append('q', search);
            if (params.toString()) url += '&' + params.toString();
            
            console.log('Loading invoices from:', url);
            
            let response = await fetch(url, { credentials: 'include' });
            console.log('Response status:', response.status, response.statusText);
            
            if (!response.ok) {
                let errorMessage = `HTTP ${response.status}`;
                try {
                    const errorData = await response.json();
                    errorMessage = errorData.detail || JSON.stringify(errorData);
                } catch (e) {
                    const errorText = await response.text().catch(() => '');
                    if (errorText) {
                        try {
                            const errorJson = JSON.parse(errorText);
                            errorMessage = errorJson.detail || errorText;
                        } catch {
                            errorMessage = errorText || errorMessage;
                        }
                    }
                }
                throw new Error(errorMessage);
            }
            
            const data = await response.json();
            console.log('Invoices data received:', { invoices: data.invoices?.length || 0, blocks: data.blocks?.length || 0, residents: data.residents?.length || 0, pagination: data.pagination });
            
            allInvoices = (data.invoices || []).map(normalizeInvoiceFromApi);
            
            blocks = data.blocks || [];
            residents = data.residents || [];
            
            // Update pagination from API
            if (data.pagination) {
                paginationState.currentPage = data.pagination.page;
                paginationState.totalItems = data.pagination.total;
                paginationState.totalPages = data.pagination.last_page;
            }
            
            filteredInvoices = [...allInvoices];
            console.log('Calling renderTable with', filteredInvoices.length, 'invoices');
            if (filteredInvoices.length > 0) {
                console.log('First invoice sample:', filteredInvoices[0]);
            }
            
            // Убеждаемся, что DOM готов перед рендерингом
            if (document.getElementById('invoicesTable')) {
                renderTable(filteredInvoices);
            } else {
                console.log('Waiting for DOM to be ready...');
                setTimeout(() => {
                    renderTable(filteredInvoices);
                }, 150);
            }
            
            updateFilterDropdowns();
            updateExportDropdowns();
            console.log('✅ loadInvoices completed successfully');
            
        } catch (error) {
            console.error('Error loading invoices:', error);
            if (typeof showError === 'function') {
                showError(`${t('invoices_load_list_error', 'Ошибка загрузки счетов')}: ${error.message}`);
            }
            allInvoices = [];

            renderTable([]);

    function applyInvoiceExportUtilityRules() {
        const root = document.getElementById('exportInvoiceMeterTypeDetails');
        if (!root) return;
        const utilityCb = root.querySelector('.export-invoice-meter-type-checkbox[value="utility"]');
        if (!utilityCb) return;
        const utilityChildren = INVOICE_EXPORT_UTILITY_TYPES
            .map((key) => root.querySelector(`.export-invoice-meter-type-checkbox[value="${key}"]`))
            .filter(Boolean);
        if (utilityCb.checked) {
            utilityChildren.forEach((cb) => {
                cb.checked = true;
                cb.disabled = true;
            });
            utilityCb.disabled = false;
            return;
        }
        utilityChildren.forEach((cb) => { cb.disabled = false; });
        const anyChildChecked = utilityChildren.some((cb) => cb.checked);
        utilityCb.disabled = anyChildChecked;
        if (anyChildChecked) utilityCb.checked = false;
    }

        const summary = document.getElementById('exportInvoiceMeterTypeSummary');
        if (!summary) return;

            summary.textContent = t('invoices_export_nothing_selected', 'Ничего не выбрано');

    function detectInvoiceLineMeterType(line) {
        const text = String(line?.description || '').toLowerCase();
        if (text.includes('канализ')) return 'SEWERAGE';
        if (text.includes('электр') || text.includes('electric') || text.includes('квт')) return 'ELECTRIC';
        if (text.includes('газ')) return 'GAS';
        if (text.includes('вод')) return 'WATER';
        if (text.includes('сервис') || text.includes('service')) return 'SERVICE';
        if (text.includes('аренд') || text.includes('rent')) return 'RENT';
        if (text.includes('строит') || text.includes('construction')) return 'CONSTRUCTION';
        return null;
    }

    function getInvoiceLineRemainingGroup(line) {
        const description = String(line?.description || '').trim();
        const text = description.toLowerCase();
        const isStable = text.includes('стабил') || text.includes('stable');

        if (isStable) {
            if (text.includes('электр') || text.includes('electric')) {
                return { key: 'STABLE_ELECTRIC', label: 'Стабильный тариф (Электричество)' };
            }
            if (text.includes('газ')) {
                return { key: 'STABLE_GAS', label: 'Стабильный тариф (Газ)' };
            }
            if (text.includes('вод')) {
                return { key: 'STABLE_WATER', label: 'Стабильный тариф (Вода)' };
            }
            if (text.includes('канализ')) {
                return { key: 'STABLE_SEWERAGE', label: 'Стабильный тариф (Канализация)' };
            }
            return { key: 'STABLE_OTHER', label: description || 'Стабильный тариф' };
        }

        const type = detectInvoiceLineMeterType(line);
        if (!type) return null;
        return { key: type, label: getInvoiceMeterLabel(type) };
    }

    function buildInvoiceServiceTariffKey(line) {
        const raw = String(line?.description || '').trim();
        if (!raw) return '';

        // 1) Формат "Газ - Qaz", "Сервис - 4234324", "Электричество - qweqwe"
        const dashIdx = raw.indexOf('-');
        if (dashIdx > 0) {
            const left = raw.slice(0, dashIdx).trim();
            const right = raw.slice(dashIdx + 1).trim();
            if (left && right) {
                return `${left} (${right})`;
            }
        }

        let base = raw.replace(/\([^)]*₼[^)]*\)\s*$/, '').trim();

        const qtyMatch = base.match(/^(.+?)\s+[\d.,]+\s*(квт·ч|квтч|квт|кВт·ч|кВтч|кВт|м³|м3|mes\.?|мес\.?)?$/i);
        if (qtyMatch) {
            return qtyMatch[1].trim();
        }

        return base;
    }

    function collectInvoiceMeterTypes(invoice) {
        const set = new Set();
        const lines = Array.isArray(invoice?.lines) ? invoice.lines : [];
        lines.forEach((line) => {
            const type = detectInvoiceLineMeterType(line);
            if (type) set.add(type);
        });
        return Array.from(set);
    }

    function filterInvoiceLinesByService(invoice, selectedTypes) {
        const lines = Array.isArray(invoice?.lines) ? invoice.lines : [];
        if (!selectedTypes || selectedTypes.length === 0 || selectedTypes.length >= INVOICE_EXPORT_METER_TYPES.length) {
            return lines;
        }
        return lines.filter((line) => {
            const type = detectInvoiceLineMeterType(line);
            return type && selectedTypes.includes(type);
        });
    }

    function monthToIndex(monthValue) {
        const raw = String(monthValue || '').trim();
        if (!raw) return null;
        const parts = raw.split('-');
        if (parts.length !== 2) return null;
        const y = Number(parts[0]);
        const m = Number(parts[1]);
        if (!Number.isFinite(y) || !Number.isFinite(m) || m < 1 || m > 12) return null;
        return y * 12 + (m - 1);
    }

    function buildInvoicesExportRows(invoices, selectedTypes = []) {
        return invoices.map((inv) => {
            const serviceLines = filterInvoiceLinesByService(inv, selectedTypes);
            const lineTexts = serviceLines.map((line) => {
                const amount = Number(line?.amount_total || 0).toFixed(2);
                return `${line?.description || '—'} (${amount} ₼)`;
            });
            const serviceCharged = serviceLines.reduce((acc, line) => acc + Number(line?.amount_total || 0), 0);
            const hasPaidMeta = serviceLines.some((line) => Number.isFinite(Number(line?.paid_amount)));
            const hasRemainingMeta = serviceLines.some((line) => Number.isFinite(Number(line?.remaining_amount)));
            const servicePaid = hasPaidMeta
                ? serviceLines.reduce((acc, line) => acc + Number(line?.paid_amount || 0), 0)
                : Math.min(serviceCharged, Number(inv.paid || 0));
            const serviceRemaining = hasRemainingMeta
                ? serviceLines.reduce((acc, line) => acc + Number(line?.remaining_amount || 0), 0)
                : Math.max(0, serviceCharged - servicePaid);

            const remainingByType = {};
            serviceLines.forEach((line) => {
                const group = getInvoiceLineRemainingGroup(line);
                if (!group) return;
                const rem = Number(line?.remaining_amount || 0);
                if (!remainingByType[group.key]) {
                    remainingByType[group.key] = { label: group.label, value: 0 };
                }
                remainingByType[group.key].value += rem;
            });
            const serviceRemainingLines = Object.values(remainingByType).map(({ label, value }) => {
                const safeValue = Number(value || 0);
                if (safeValue <= 0.0001) {
                    return `${label}: 0.00 ₼`;
                }
                return `${label.toLowerCase()} ${safeValue.toFixed(2)} ₼`;
            });

            const serviceTariffAmounts = {};
            serviceLines.forEach((line) => {
                const type = detectInvoiceLineMeterType(line);
                if (!type) return;
                if (Array.isArray(selectedTypes) && selectedTypes.length > 0 && !selectedTypes.includes(type)) return;
                const key = buildInvoiceServiceTariffKey(line);
                if (!key) return;
                const amount = Number(line?.amount_total || 0);
                if (!(amount > 0)) return;
                serviceTariffAmounts[key] = (serviceTariffAmounts[key] || 0) + amount;
            });

            return {
                period: `${inv.periodYear}-${String(inv.periodMonth).padStart(2, '0')}`,
                block: inv.blockName || '—',
                unit: inv.unitNumber || '—',
                residentFullName: inv.residentUserFullName || '—',
                residentPhone: inv.residentUserPhone || '—',
                residentCode: inv.residentCode || '—',
                invoiceNumber: inv.invoiceNumber || '—',
                status: getInvoiceStatusLabel(inv.status),
                amount: Number(serviceCharged || 0),
                paid: Number(servicePaid || 0),
                remaining: Number(serviceRemaining || 0),
                dueDate: inv.dueDateRaw || '—',
                paymentMethodsText: (Array.isArray(inv.paymentMethods) && inv.paymentMethods.length)
                    ? inv.paymentMethods.map((m) => getInvoicePaymentMethodLabel(m)).join(', ')
                    : '—',
                linesList: lineTexts.length ? lineTexts : ['—'],
                remainingByServicesList: serviceRemainingLines.length ? serviceRemainingLines : ['—'],
                serviceTariffAmounts
            };
        });
    }

    async function fetchAllInvoicesForExport(filters) {
        const out = [];
        let page = 1;
        let lastPage = 1;
        do {
            const params = new URLSearchParams();
            params.append('page', String(page));
            params.append('per_page', '200');
            if (filters.status && filters.status !== 'all') params.append('status', filters.status.toUpperCase());
            if (filters.blockValue && filters.blockValue !== 'all') params.append('block_id', String(filters.blockValue));
            if (filters.residentValue && filters.residentValue !== 'all') params.append('resident_id', String(filters.residentValue));
            if (filters.invoiceNumber) params.append('q', filters.invoiceNumber);

            const response = await fetch(`${API_BASE}/api/invoices?${params.toString()}`, { credentials: 'include' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const items = Array.isArray(data?.invoices) ? data.invoices : [];
            out.push(...items.map(normalizeInvoiceFromApi));
            lastPage = Math.max(1, Number(data?.pagination?.last_page || 1));
            page += 1;
        } while (page <= lastPage);
        return out;
    }

    function applyInvoicesExportClientFilters(invoices, filters) {
        const fromIdx = monthToIndex(filters.periodFrom);
        const toIdx = monthToIndex(filters.periodTo);
        const residentSearch = String(filters.residentSearch || '').trim().toLowerCase();
        const invoiceNumber = String(filters.invoiceNumber || '').trim().toLowerCase();
        const dueDateTo = filters.dueDateTo ? new Date(filters.dueDateTo) : null;
        const amountFrom = filters.amountFrom;
        const amountTo = filters.amountTo;
        const methodFilter = filters.paymentMethod;
        const selectedMeterTypes = Array.isArray(filters.meterTypes) ? filters.meterTypes : [];
        const meterFilterAll = selectedMeterTypes.length === 0 || selectedMeterTypes.length >= INVOICE_EXPORT_METER_TYPES.length;

        return invoices.filter((inv) => {
            if (residentSearch) {
                const blob = `${inv.residentUserFullName || ''} ${inv.residentUserPhone || ''} ${inv.residentCode || ''} ${inv.unitNumber || ''}`.toLowerCase();
                if (!blob.includes(residentSearch)) return false;
            }

            if (invoiceNumber) {
                const num = String(inv.invoiceNumber || inv.number || '').toLowerCase();
                if (!num.includes(invoiceNumber)) return false;
            }

            if (fromIdx !== null || toIdx !== null) {
                const idx = Number(inv.periodYear) * 12 + (Number(inv.periodMonth) - 1);
                if (fromIdx !== null && idx < fromIdx) return false;
                if (toIdx !== null && idx > toIdx) return false;
            }

            if (dueDateTo && inv.dueDateRaw) {
                const due = new Date(inv.dueDateRaw);
                if (!(due instanceof Date) || Number.isNaN(due.getTime()) || due > dueDateTo) return false;
            } else if (dueDateTo && !inv.dueDateRaw) {
                return false;
            }

            if (methodFilter && methodFilter !== 'all') {
                const methods = Array.isArray(inv.paymentMethods) ? inv.paymentMethods : [];
                if (!methods.includes(methodFilter)) return false;
            }

            const serviceLines = filterInvoiceLinesByService(inv, selectedMeterTypes);
            if (!meterFilterAll) {
                const invoiceTypes = serviceLines.map((line) => detectInvoiceLineMeterType(line)).filter(Boolean);
                if (!invoiceTypes.some((t) => selectedMeterTypes.includes(t))) return false;
            }

            const amount = serviceLines.reduce((acc, line) => acc + Number(line?.amount_total || 0), 0);
            if (amountFrom !== null && amount < amountFrom) return false;
            if (amountTo !== null && amount > amountTo) return false;

            return true;
        });
    }

    async function runInvoicesExport() {
        const exportBtn = document.getElementById('invoicesExportRunBtn');
        const statusEl = document.getElementById('exportInvoiceStatus');
        const residentSearchEl = document.getElementById('exportResidentSearch');
        const invoiceNumberEl = document.getElementById('exportInvoiceNumber');
        const periodFromEl = document.getElementById('exportPeriodFrom');
        const periodToEl = document.getElementById('exportPeriodTo');
        const dueDateToEl = document.getElementById('exportDueDateTo');
        const blockEl = document.getElementById('exportBlock');
        const residentEl = document.getElementById('exportResident');
        const amountFromEl = document.getElementById('exportAmountFrom');
        const amountToEl = document.getElementById('exportAmountTo');
        const paymentMethodEl = document.getElementById('exportPaymentMethod');
        const formatEl = document.getElementById('invoicesExportFormat');

        const filters = {
            status: statusEl?.value || 'all',
            residentSearch: String(residentSearchEl?.value || '').trim(),
            invoiceNumber: String(invoiceNumberEl?.value || '').trim(),
            periodFrom: periodFromEl?.value || '',
            periodTo: periodToEl?.value || '',
            dueDateTo: dueDateToEl?.value || '',
            blockValue: blockEl?.value || 'all',
            blockText: blockEl?.options?.[blockEl.selectedIndex]?.text || '',
            residentValue: residentEl?.value || 'all',
            residentText: residentEl?.options?.[residentEl.selectedIndex]?.text || '',
            amountFrom: amountFromEl?.value ? Number(amountFromEl.value) : null,
            amountTo: amountToEl?.value ? Number(amountToEl.value) : null,
            paymentMethod: paymentMethodEl?.value || 'all',
            meterTypes: getSelectedInvoiceExportMeterTypes(),
            format: formatEl?.value || 'xls'
        };

        if (exportBtn) {
            exportBtn.disabled = true;
            exportBtn.textContent = t('export', 'Экспорт') + '...';
        }
        try {
            const rawInvoices = await fetchAllInvoicesForExport(filters);
            const detailedInvoices = await Promise.all(rawInvoices.map(async (inv) => {
                try {
                    const detail = await fetchInvoiceDetailForExport(inv.id);
                    return {
                        ...inv,
                        residentUserPhone: detail?.residentUserPhone || inv.residentUserPhone || '—',
                        lines: Array.isArray(detail?.lines) && detail.lines.length ? detail.lines : inv.lines
                    };
                } catch (detailError) {
                    console.warn('Invoice detail export fallback:', inv.id, detailError);
                    return inv;
                }
            }));

            const filtered = applyInvoicesExportClientFilters(detailedInvoices, filters);
            if (!filtered.length) {
                if (typeof showWarning === 'function') showWarning(t('payments_export_no_data', 'Нет данных для экспорта по выбранным фильтрам.'));
                return;
            }
            const rows = buildInvoicesExportRows(filtered, filters.meterTypes);
            const filtersText = buildInvoicesExportFiltersText(filters);
            if (filters.format === 'pdf') {
                exportInvoicesToPdf(rows, filtersText);
            } else {
                exportInvoicesToStyledExcel(rows, filtersText);
            }
            if (typeof showSuccess === 'function') showSuccess('Экспорт выполнен.');
        } catch (error) {
            console.error('Invoices export error:', error);
            if (typeof showError === 'function') showError(t('payments_export_error_prefix', 'Ошибка экспорта') + ': ' + error.message);
        } finally {
            if (exportBtn) {
                exportBtn.disabled = false;
                exportBtn.innerHTML = '<i class="bi bi-box-arrow-down"></i> Экспорт';
            }
        }
    }

    function buildInvoicePageList(current, total) {
        if (total <= 5) {
            return Array.from({ length: total }, (_, i) => i + 1);
        }
        const pages = new Set([1, total]);
        if (current <= 3) {
            [2, 3, 4, 5].forEach(p => pages.add(p));
        } else if (current >= total - 2) {
            [total - 1, total - 2, total - 3, total - 4].forEach(p => pages.add(p));
        } else {
            [current - 2, current - 1, current, current + 1, current + 2].forEach(p => pages.add(p));
        }
        const sorted = Array.from(pages).filter(p => p >= 1 && p <= total).sort((a, b) => a - b);
        const result = [];
        for (let i = 0; i < sorted.length; i++) {
            const page = sorted[i];
            result.push(page);
            const next = sorted[i + 1];
            if (next && next - page > 1) {
                result.push('dots');
            }
        }
        return result;
    }

        const prevBtn = document.getElementById('invoicePrevBtn');
        const nextBtn = document.getElementById('invoiceNextBtn');
        const pagesContainer = document.getElementById('invoicePageButtons');
        
        if (currentPageEl) currentPageEl.textContent = paginationState.currentPage;
        if (totalPagesEl) totalPagesEl.textContent = paginationState.totalPages;
        if (totalItemsEl) totalItemsEl.textContent = paginationState.totalItems;
        if (prevBtn) prevBtn.disabled = paginationState.currentPage <= 1;
        if (nextBtn) nextBtn.disabled = paginationState.currentPage >= paginationState.totalPages;

        if (!pagesContainer) return;
        pagesContainer.innerHTML = '';

        const pages = buildInvoicePageList(paginationState.currentPage, paginationState.totalPages);
        pages.forEach(p => {
            const btn = document.createElement('button');
            btn.className = 'btn-pagination';

            if (p === 'dots') {
                btn.textContent = '...';
                btn.disabled = true;
                btn.classList.add('dots');
            } else {
                btn.textContent = p;
                if (p > paginationState.totalPages) {
                    btn.disabled = true;
                } else {
                    btn.onclick = () => {
                        if (p !== paginationState.currentPage) {
                            goToInvoicePage(p);
                        }
                    };
                }
                if (p === paginationState.currentPage) {
                    btn.classList.add('active');
                    btn.setAttribute('aria-current', 'page');
                }
            }

            pagesContainer.appendChild(btn);
        });
    }
    
    // Pagination functions
    window.goToInvoicePage = function(page) {
        if (page === 'prev') {
            if (paginationState.currentPage > 1) {
                paginationState.currentPage--;
                loadInvoices();
            }
        } else if (page === 'next') {
            if (paginationState.currentPage < paginationState.totalPages) {
                paginationState.currentPage++;
                loadInvoices();
            }
        } else if (typeof page === 'number') {
            paginationState.currentPage = page;
            loadInvoices();
        }
    };
    
    window.changeInvoiceItemsPerPage = function() {
        const select = document.getElementById('invoiceItemsPerPage');
        if (select) {
            paginationState.itemsPerPage = parseInt(select.value);
            paginationState.currentPage = 1;
            loadInvoices();
            updateCustomInvoicePaginationDropdown();
        }
    };

        // Use SPA router to navigate - this prevents double-load issues
        if (window.spaRouter && typeof window.spaRouter.navigate === 'function') {
            window.spaRouter.navigate(`/invoice-view?id=${id}`);
        } else {
            // Fallback to direct hash navigation
            window.location.hash = `#/invoice-view?id=${id}`;

    // Update custom pagination dropdown display
    function updateCustomInvoicePaginationDropdown() {
        const select = document.getElementById('invoiceItemsPerPage');
        const customSelect = document.getElementById('customInvoiceItemsPerPage');
        if (!select || !customSelect) return;
        
        const value = select.value;
        const selectText = customSelect.querySelector('.select-text');
        const options = customSelect.querySelectorAll('.select-option');
        
        if (selectText) selectText.textContent = value;
        options.forEach(opt => {
            opt.classList.remove('selected');
            if (opt.getAttribute('data-value') === value) {
                opt.classList.add('selected');
            }
        });
    }
    
    // Initialize custom pagination dropdown
    let invoiceDropdownInitialized = false;
    function initCustomInvoicePaginationDropdown() {
        const customSelect = document.getElementById('customInvoiceItemsPerPage');
        if (!customSelect) return;
        
        // Предотвращаем повторную инициализацию
        if (customSelect.dataset.initialized === 'true') {
            updateCustomInvoicePaginationDropdown();
            return;
        }
        customSelect.dataset.initialized = 'true';
        
        const selectBtn = customSelect.querySelector('.select-btn');
        const selectOptions = customSelect.querySelector('.select-options');
        const options = selectOptions ? selectOptions.querySelectorAll('.select-option') : [];
        
        if (selectBtn) {
            selectBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                customSelect.classList.toggle('open');
            });
        }
        
        options.forEach(opt => {
            opt.addEventListener('click', function() {
                const value = this.getAttribute('data-value');
                const select = document.getElementById('invoiceItemsPerPage');
                if (select) {
                    select.value = value;
                    changeInvoiceItemsPerPage();
                }
                customSelect.classList.remove('open');
            });
        });
        
        // Добавляем обработчик закрытия при клике вне dropdown только один раз
        if (!invoiceDropdownInitialized) {
            document.addEventListener('click', function(e) {
                if (!customSelect.contains(e.target)) {
                    customSelect.classList.remove('open');
                }
            });
            invoiceDropdownInitialized = true;
        }
        
        updateCustomInvoicePaginationDropdown();
    }

        document.removeEventListener('spa:contentLoaded', window._invoicesContentLoadedHandler);
    }
    
    window._invoicesContentLoadedHandler = function(e) {

        const route = detail.route || window.location.hash.split('?')[0].replace('#', '');

    // Also try to load immediately if page is already loaded

    // Invoice Actions Functions
    window.issueInvoiceByBlock = async function() {
        const blockSelect = document.getElementById('invoiceBlock');
        const blockValue = blockSelect?.value;
        const dueDateInput = document.getElementById('invoiceDueDate');
        const dueDate = dueDateInput?.value;
        
        if (!blockValue || blockValue === '') {
            if (typeof showWarning === 'function') {
                showWarning('Пожалуйста, выберите блок!');
            } else {
                alert('Пожалуйста, выберите блок!');
            }
            return;
        }
        
        // Check if blockValue is a number (ID) or a string (name)
        let blockId = null;
        if (!isNaN(blockValue) && blockValue !== '') {
            // It's a number (ID)
            blockId = parseInt(blockValue);
        } else {
            // It's a name (A, B, K, etc.) - need to find ID from blocks array
            const block = blocks.find(b => b.name === blockValue);
            if (!block) {
                if (typeof showError === 'function') {
                    showError(`Блок "${blockValue}" не найден. Пожалуйста, обновите страницу.`);
                } else {
                    alert(`Блок "${blockValue}" не найден. Пожалуйста, обновите страницу.`);
                }
                return;
            }
            blockId = block.id;
        }
        
        console.log('Issue invoice by block:', { blockValue, blockId, dueDate, blocks: blocks.length });
        
        try {
            // Convert date from DD.MM.YYYY to YYYY-MM-DD if needed
            let formattedDueDate = null;
            if (dueDate) {
                console.log('📅 Original dueDate:', dueDate, 'type:', typeof dueDate);
                // Check if date is in DD.MM.YYYY format
                if (dueDate.includes('.')) {
                    const parts = dueDate.split('.');
                    if (parts.length === 3) {
                        formattedDueDate = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                        console.log('📅 Converted from DD.MM.YYYY to YYYY-MM-DD:', formattedDueDate);
                    } else {
                        formattedDueDate = dueDate;
                    }
                } else {
                    // If it's already in YYYY-MM-DD format (from date input), use as is
                    formattedDueDate = dueDate;
                    console.log('📅 Using date as is (YYYY-MM-DD):', formattedDueDate);
                }
            } else {
                console.log('⚠️ No due date provided');
            }
            
            const payload = {
                action: 'by_block',
                block_id: parseInt(blockId),
                due_date: formattedDueDate
            };
            
            console.log('📤 Sending bulk issue request:', JSON.stringify(payload, null, 2));
            
            let url = `${API_BASE}/api/invoices/bulk-issue`;
            let response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload),
                credentials: 'include'
            });
            
            if (!response.ok) {
                let errorMessage = `HTTP ${response.status}`;
                try {
                    const errorData = await response.json();
                    errorMessage = errorData.detail || JSON.stringify(errorData);
                } catch (e) {
                    const errorText = await response.text().catch(() => '');
                    if (errorText) {
                        try {
                            const errorJson = JSON.parse(errorText);
                            errorMessage = errorJson.detail || errorText;
                        } catch {
                            errorMessage = errorText || errorMessage;
                        }
                    }
                }
                throw new Error(errorMessage);
            }
            
            const data = await response.json();
            console.log('📥 Bulk issue response:', JSON.stringify(data, null, 2));
            
            if (typeof showSuccess === 'function') {
                showSuccess(data.message || `Счета по блоку успешно выставлены! Выставлено: ${data.count}`);
            } else {
                alert(data.message || `Счета по блоку успешно выставлены! Выставлено: ${data.count}`);
            }
            
            // Reload invoices to show updated status
            loadInvoices();
            
        } catch (error) {
            console.error('Error issuing invoices by block:', error);
            if (typeof showError === 'function') {
                showError(`${t('invoices_issue_error', 'Ошибка выставления счетов')}: ${error.message}`);
            } else {
                alert(`${t('invoices_issue_error', 'Ошибка выставления счетов')}: ${error.message}`);
            }
        }
    };

    window.applyInvoiceFilters = function() {
        // Reset to first page on filter
        paginationState.currentPage = 1;
        // Reload invoices with filters from API
        loadInvoices();
    };
    
    // Helper functions to extract year and month
    function extractYear(dateString) {
        if (!dateString) return null;
        const yearMatch = dateString.match(/(\d{4})/);
        return yearMatch ? parseInt(yearMatch[1]) : null;
    }
    
    function extractMonth(dateString) {
        if (!dateString) return null;
        
        // Try to extract month from date string (format: YYYY-MM-DD)
        const dateMatch = dateString.match(/\d{4}-(\d{2})-\d{2}/);
        if (dateMatch) {
            return parseInt(dateMatch[1]);
        }
        
        // Try to extract from period (e.g., "Октябрь 2024")
        const monthNames = {
            'январь': 1, 'февраль': 2, 'март': 3, 'апрель': 4,
            'май': 5, 'июнь': 6, 'июль': 7, 'август': 8,
            'сентябрь': 9, 'октябрь': 10, 'ноябрь': 11, 'декабрь': 12
        };
        
        const lowerDate = dateString.toLowerCase();
        for (const [monthName, monthNum] of Object.entries(monthNames)) {
            if (lowerDate.includes(monthName)) {
                return monthNum;
            }
        }
        
        return null;
    }
    
    // Clear filters function
    window.clearInvoiceFilters = function() {
        document.getElementById('filterYear').value = '';
        document.getElementById('filterMonth').value = '';
        document.getElementById('filterResident').value = 'all';
        document.getElementById('filterStatus').value = 'all';
        document.getElementById('filterSearch').value = '';
        
        paginationState.currentPage = 1;
        loadInvoices();
        
        if (typeof showSuccess === 'function') {
            showSuccess('Фильтры очищены!');

    };
    
    window.openDatePicker = function(inputId) {
        const input = document.getElementById(inputId);
        if (input) {
            // Use native showPicker if available (modern browsers)
            if (input.showPicker && typeof input.showPicker === 'function') {
                input.showPicker().catch(err => {
                    input.focus();
                    input.click();
                });
            } else {
                input.focus();
                input.click();
            }
        }
    };

    // Auto-apply filters on input change and initialize date picker
    document.addEventListener('DOMContentLoaded', function() {
        bindInvoicesExportToggleButton();
        bindInvoiceExportMeterTypeMultiSelect();
        bindInvoicesExportActions();

        // Setup filter inputs
        const filterInputs = ['filterYear', 'filterMonth', 'filterResident', 'filterStatus', 'filterSearch'];
        filterInputs.forEach(inputId => {
            const input = document.getElementById(inputId);
            if (input) {
                if (inputId === 'filterSearch') {
                    let searchTimeout;
                    input.addEventListener('input', function() {
                        clearTimeout(searchTimeout);
                        searchTimeout = setTimeout(applyInvoiceFilters, 300);
                    });
                } else {
                    input.addEventListener('change', applyInvoiceFilters);
                }
            }
        });

        // Setup date picker click handler
        const dateInput = document.getElementById('invoiceDueDate');
        if (dateInput) {
            dateInput.addEventListener('click', function() {
                if (this.showPicker && typeof this.showPicker === 'function') {
                    this.showPicker().catch(() => {});
                }
            });
        }
    });
